<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>函数可视化平台</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Avenir', 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0b0f1c, #020408);
            color: #e0f2ff;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* ===== App 容器 ===== */
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 标题栏 ===== */
        .header {
            flex-shrink: 0;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            background: rgba(4, 12, 24, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.15);
            z-index: 10;
            min-height: 52px;
            gap: 8px;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00ffff, #b44cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #00aaff88, 0 0 40px #7a4cff66;
            white-space: nowrap;
        }
        .function-badge {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: transparent;
            border: 1.5px solid #2f6f9f;
            color: #aad0ff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 12px #00aaff33;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            background: rgba(8, 25, 45, 0.5);
            touch-action: manipulation;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: #00aaff22;
            border-color: #0cf;
            color: #b0f0ff;
            box-shadow: 0 0 24px #0cf, inset 0 0 8px #0cf6;
            text-shadow: 0 0 12px #0cf;
        }
        .tab-btn:active {
            transform: scale(0.94);
        }

        /* ===== 3D 画布容器 ===== */
        #canvas-container {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        /* ===== 坐标悬停提示 ===== */
        .coordinate-hint {
            position: absolute;
            bottom: 20px;
            left: 16px;
            background: rgba(4, 24, 38, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(0, 204, 255, 0.4);
            color: #b5f0ff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            box-shadow: 0 0 30px #00aaff44;
            pointer-events: none;
            z-index: 15;
            white-space: nowrap;
        }

        /* ===== 网格切换按钮 ===== */
        .grid-toggle-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 18, 30, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 204, 255, 0.5);
            color: #aaf0ff;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            z-index: 16;
            box-shadow: 0 0 15px #0cf4;
            transition: 0.2s;
            pointer-events: auto;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .grid-toggle-btn:active {
            transform: translateX(-50%) scale(0.94);
            background: #0cf3;
            color: #000c14;
        }

        /* ===== 版权信息 ===== */
        .copyright {
            position: absolute;
            bottom: 20px;
            right: 16px;
            color: #6c8db0;
            font-size: 0.8rem;
            opacity: 0.7;
            text-shadow: 0 0 8px #0cf;
            z-index: 15;
            pointer-events: none;
        }

        /* ========================================================
                   控制面板 — 桌面端 (右侧固定)
                   ======================================================== */
        .control-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 300px;
            max-height: calc(100% - 120px);
            background: rgba(6, 18, 30, 0.78);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 204, 255, 0.25);
            border-radius: 28px;
            padding: 22px 18px 18px;
            box-shadow: 0 20px 40px #00000080, 0 0 0 1px #0cf1 inset, 0 0 30px #00aaff4d;
            z-index: 20;
            color: #d3ecff;
            transition: opacity 0.3s ease, transform 0.3s ease;
            overflow-y: auto;
            overscroll-behavior: contain;
        }
        /* 桌面端隐藏手柄 */
        .panel-handle {
            display: none;
        }

        .param-group {
            margin-bottom: 20px;
        }
        .param-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: #7fc9ff;
            text-shadow: 0 0 10px #0cf;
            border-left: 4px solid #0cf;
            padding-left: 10px;
        }
        .slider-item {
            margin-bottom: 14px;
        }
        .slider-item label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: #bbe4ff;
            text-shadow: 0 0 5px #2af6;
            gap: 8px;
        }
        .slider-item input[type="range"] {
            width: 100%;
            margin-top: 4px;
            background: transparent;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 10px;
            background: linear-gradient(90deg, #0cf, #b44cff);
            box-shadow: 0 0 12px #0cf4;
            touch-action: none;
        }
        .slider-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #0cf;
            box-shadow: 0 0 20px #0cf, 0 0 8px #fff;
            cursor: pointer;
            transition: 0.1s;
            touch-action: none;
        }
        .slider-item input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #0cf;
            box-shadow: 0 0 20px #0cf, 0 0 8px #fff;
            cursor: pointer;
            touch-action: none;
        }
        .value-display {
            font-family: 'JetBrains Mono', monospace;
            color: #b2fcff;
            background: #0a1e2e;
            padding: 0 10px;
            border-radius: 24px;
            border: 1px solid #0cf6;
            font-size: 0.75rem;
            min-width: 44px;
            text-align: center;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 16px 0 14px;
        }
        .neon-btn {
            background: transparent;
            border: 1.5px solid #0cf;
            color: #d4f2ff;
            flex: 1;
            padding: 8px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 15px #0cf4;
            cursor: pointer;
            transition: 0.2s;
            background: #0a1e2e80;
            touch-action: manipulation;
        }
        .neon-btn:active {
            transform: scale(0.94);
            background: #0cf3;
            box-shadow: 0 0 30px #0cf, inset 0 0 10px white;
            color: #000c14;
            border-color: #fff;
        }

        .info-card {
            background: rgba(4, 18, 30, 0.6);
            border-radius: 18px;
            padding: 14px;
            border: 1px solid rgba(255, 77, 154, 0.25);
            box-shadow: 0 0 20px #ff4d9a22;
            margin-top: 10px;
        }
        .expression {
            font-size: 1.0rem;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            background: #00000040;
            padding: 10px 4px;
            border-radius: 16px;
            border: 1px solid rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 30px #ff44ee44;
            color: #ffe6ff;
            text-shadow: 0 0 15px #f0f;
            margin-bottom: 10px;
            word-break: break-all;
            font-size: 0.85rem;
        }
        .vertex-info {
            font-size: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            justify-content: center;
            color: #aaf0ff;
        }
        .vertex-info span {
            background: rgba(0, 20, 40, 0.4);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 204, 255, 0.15);
        }

        /* 隐藏工具类 */
        .hidden {
            display: none !important;
        }

        /* ========================================================
                   移动端专用样式 (宽度 ≤ 820px)
                   ======================================================== */
        @media (max-width: 820px) {
            /* 标题栏适配 */
            .header {
                padding: 8px 12px;
                min-height: 44px;
            }
            .logo {
                font-size: 0.95rem;
                letter-spacing: 1px;
            }
            .tab-btn {
                font-size: 0.6rem;
                padding: 4px 10px;
                border-width: 1.2px;
            }

            /* 坐标提示 */
            .coordinate-hint {
                bottom: 12px;
                left: 12px;
                font-size: 0.6rem;
                padding: 4px 12px;
            }

            /* 网格按钮 */
            .grid-toggle-btn {
                bottom: 12px;
                font-size: 0.6rem;
                padding: 4px 12px;
                left: 50%;
                transform: translateX(-50%);
            }
            .grid-toggle-btn:active {
                transform: translateX(-50%) scale(0.94);
            }

            /* 版权 */
            .copyright {
                bottom: 12px;
                right: 12px;
                font-size: 0.5rem;
            }

            /* ===== 控制面板 — 移动端：底部抽屉 ===== */
            .control-panel {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                top: auto;
                width: 100%;
                max-height: 58vh;
                background: rgba(4, 12, 24, 0.88);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border: none;
                border-top: 1px solid rgba(0, 204, 255, 0.3);
                border-radius: 24px 24px 0 0;
                padding: 0 16px 14px;
                box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(0, 170, 255, 0.15);
                transform: translateY(calc(100% - 48px));
                transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
                overflow: hidden;
                z-index: 30;
                touch-action: none;
            }
            .control-panel.open {
                transform: translateY(0);
            }

            /* 手柄条 */
            .panel-handle {
                display: flex !important;
                flex-shrink: 0;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 48px;
                width: 100%;
                cursor: pointer;
                touch-action: manipulation;
                padding: 6px 0 2px;
                user-select: none;
                -webkit-user-select: none;
                background: transparent;
                border: none;
                color: #7fc9ff;
                font-size: 0.65rem;
                letter-spacing: 1px;
                gap: 2px;
            }
            .panel-handle .handle-bar {
                width: 44px;
                height: 4px;
                border-radius: 4px;
                background: rgba(0, 204, 255, 0.5);
                transition: background 0.2s;
                flex-shrink: 0;
            }
            .panel-handle .handle-label {
                font-size: 0.55rem;
                opacity: 0.7;
                letter-spacing: 2px;
                text-transform: uppercase;
                transition: opacity 0.2s;
                margin-top: 1px;
            }
            .panel-handle:active .handle-bar {
                background: #0cf;
            }
            .panel-handle:active .handle-label {
                opacity: 1;
            }

            /* 面板内容滚动区域 */
            .panel-scroll {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 4px 2px 8px;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
                max-height: calc(58vh - 48px - 20px);
            }

            /* 移动端参数样式调整 */
            .param-title {
                font-size: 0.65rem;
                margin-bottom: 8px;
                padding-left: 8px;
            }
            .slider-item {
                margin-bottom: 10px;
            }
            .slider-item label {
                font-size: 0.7rem;
                gap: 4px;
            }
            .slider-item input[type="range"] {
                height: 5px;
                margin-top: 2px;
            }
            .slider-item input[type="range"]::-webkit-slider-thumb {
                width: 26px;
                height: 26px;
            }
            .slider-item input[type="range"]::-moz-range-thumb {
                width: 26px;
                height: 26px;
            }
            .value-display {
                font-size: 0.65rem;
                min-width: 36px;
                padding: 0 6px;
            }
            .neon-btn {
                font-size: 0.65rem;
                padding: 8px 0;
            }
            .action-buttons {
                margin: 10px 0 10px;
                gap: 8px;
            }
            .info-card {
                padding: 10px;
                margin-top: 6px;
                border-radius: 14px;
            }
            .expression {
                font-size: 0.75rem;
                padding: 8px 4px;
                margin-bottom: 6px;
            }
            .vertex-info {
                font-size: 0.65rem;
                gap: 4px 8px;
            }
            .vertex-info span {
                padding: 1px 8px;
            }

            /* 去掉桌面端右侧面板的定位偏移 */
            .control-panel {
                right: auto;
                top: auto;
            }

            /* 展开时把网格按钮往上挪一点，避免被面板遮挡 */
            .control-panel.open~.grid-toggle-btn {
                bottom: calc(58vh + 8px);
            }
            .control-panel.open~.coordinate-hint {
                bottom: calc(58vh + 8px);
            }
            .control-panel.open~.copyright {
                bottom: calc(58vh + 8px);
            }

            /* 调整坐标提示在面板展开时的位置 */
            .coordinate-hint {
                transition: bottom 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            }
            .grid-toggle-btn {
                transition: bottom 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            }
            .copyright {
                transition: bottom 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            }
        }

        /* ===== 超小屏 (≤ 420px) 进一步优化 ===== */
        @media (max-width: 420px) {
            .header {
                padding: 6px 10px;
                min-height: 38px;
            }
            .logo {
                font-size: 0.8rem;
                letter-spacing: 0px;
            }
            .tab-btn {
                font-size: 0.5rem;
                padding: 3px 8px;
            }
            .control-panel {
                max-height: 52vh;
                padding: 0 10px 10px;
                border-radius: 18px 18px 0 0;
            }
            .panel-handle {
                height: 40px;
            }
            .panel-handle .handle-bar {
                width: 32px;
                height: 3px;
            }
            .panel-handle .handle-label {
                font-size: 0.45rem;
            }
            .panel-scroll {
                max-height: calc(52vh - 40px - 16px);
            }
            .param-title {
                font-size: 0.55rem;
                margin-bottom: 6px;
            }
            .slider-item {
                margin-bottom: 6px;
            }
            .slider-item label {
                font-size: 0.6rem;
            }
            .slider-item input[type="range"]::-webkit-slider-thumb {
                width: 22px;
                height: 22px;
            }
            .slider-item input[type="range"]::-moz-range-thumb {
                width: 22px;
                height: 22px;
            }
            .value-display {
                font-size: 0.55rem;
                min-width: 30px;
                padding: 0 4px;
            }
            .neon-btn {
                font-size: 0.55rem;
                padding: 6px 0;
            }
            .expression {
                font-size: 0.65rem;
                padding: 6px 4px;
            }
            .vertex-info {
                font-size: 0.55rem;
            }
            .coordinate-hint {
                font-size: 0.5rem;
                padding: 3px 10px;
                bottom: 8px;
                left: 8px;
            }
            .grid-toggle-btn {
                font-size: 0.5rem;
                padding: 3px 10px;
                bottom: 8px;
            }
            .copyright {
                font-size: 0.4rem;
                bottom: 8px;
                right: 8px;
            }
            .control-panel.open~.coordinate-hint {
                bottom: calc(52vh + 6px);
            }
            .control-panel.open~.grid-toggle-btn {
                bottom: calc(52vh + 6px);
            }
            .control-panel.open~.copyright {
                bottom: calc(52vh + 6px);
            }
        }

        /* ===== 滚动条美化 ===== */
        .panel-scroll::-webkit-scrollbar {
            width: 3px;
        }
        .panel-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .panel-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 204, 255, 0.3);
            border-radius: 10px;
        }
        .control-panel::-webkit-scrollbar {
            width: 4px;
        }
        .control-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .control-panel::-webkit-scrollbar-thumb {
            background: rgba(0, 204, 255, 0.25);
            border-radius: 10px;
        }

        /* ===== 桌面端小屏适配 ===== */
        @media (min-width: 821px) and (max-width: 1024px) {
            .control-panel {
                width: 260px;
                right: 14px;
                top: 76px;
                padding: 18px 14px 14px;
                max-height: calc(100% - 100px);
            }
            .expression {
                font-size: 0.8rem;
            }
            .slider-item label {
                font-size: 0.7rem;
            }
            .value-display {
                font-size: 0.65rem;
                min-width: 36px;
            }
        }

        /* ===== 安全区域适配 (刘海屏) ===== */
        @supports (padding: max(0px)) {
            .control-panel {
                padding-bottom: max(14px, env(safe-area-inset-bottom, 14px));
            }
            @media (max-width: 820px) {
                .control-panel {
                    padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
                }
                .panel-handle {
                    padding-top: max(6px, env(safe-area-inset-top, 6px));
                }
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ===== 标题栏 ===== -->
        <header class="header">
            <div class="logo">◈ 函数可视化</div>
            <div class="function-badge">
                <button id="tab-linear" class="tab-btn active">⚡ 一次函数</button>
                <button id="tab-quadratic" class="tab-btn">🌀 二次函数</button>
            </div>
        </header>

        <!-- ===== 3D 画布容器 ===== -->
        <div id="canvas-container"></div>

        <!-- ===== 悬停坐标提示 ===== -->
        <div id="hover-coords" class="coordinate-hint">⟳ 悬停查看坐标</div>

        <!-- ===== 网格切换按钮 ===== -->
        <button id="toggle-grid-btn" class="grid-toggle-btn">🌐 隐藏网格</button>

        <!-- ===== 版权 ===== -->
        <div class="copyright">©Twolobster丨EduMath · Graph</div>

        <!-- ============================================================
        控制面板
        ============================================================ -->
        <div id="control-panel" class="control-panel">
            <!-- 手柄 (移动端显示) -->
            <button class="panel-handle" id="panel-handle" aria-label="切换控制面板">
                <span class="handle-bar"></span>
                <span class="handle-label" id="handle-label">展开参数</span>
            </button>

            <!-- 可滚动内容 -->
            <div class="panel-scroll" id="panel-scroll">
                <!-- 线性参数 -->
                <div id="linear-params" class="param-group">
                    <div class="param-title">线性参数 k · b</div>
                    <div class="slider-item">
                        <label>斜率 K <span id="k-val" class="value-display">1.00</span></label>
                        <input type="range" id="k-slider" min="-5" max="5" step="0.05" value="1.0">
                    </div>
                    <div class="slider-item">
                        <label>截距 b <span id="b-val" class="value-display">0.00</span></label>
                        <input type="range" id="b-slider" min="-5" max="5" step="0.1" value="0.0">
                    </div>
                </div>

                <!-- 二次参数 -->
                <div id="quad-params" class="param-group hidden">
                    <div class="param-title">二次系数 a · b · c</div>
                    <div class="slider-item">
                        <label>二次项 a <span id="a-val" class="value-display">1.00</span></label>
                        <input type="range" id="a-slider" min="-2.5" max="2.5" step="0.05" value="1.0">
                    </div>
                    <div class="slider-item">
                        <label>一次项 b <span id="b2-val" class="value-display">0.00</span></label>
                        <input type="range" id="b2-slider" min="-5" max="5" step="0.1" value="0.0">
                    </div>
                    <div class="slider-item">
                        <label>常数 c <span id="c-val" class="value-display">0.00</span></label>
                        <input type="range" id="c-slider" min="-5" max="5" step="0.1" value="0.0">
                    </div>
                </div>

                <!-- 按钮组 -->
                <div class="action-buttons">
                    <button id="reset-btn" class="neon-btn">⟲ 重置</button>
                    <button id="random-btn" class="neon-btn">🎲 随机</button>
                </div>

                <!-- 信息卡片 -->
                <div class="info-card">
                    <div id="func-expression" class="expression">y = 1.00 x + 0.00</div>
                    <div id="extra-info" class="vertex-info">
                        <span>Y截距: (0, 0.00)</span>
                        <span>X截距: (0.00, 0)</span>
                    </div>
                </div>
            </div><!-- /panel-scroll -->
        </div><!-- /control-panel -->
    </div>

    <!-- ============================================================
    Three.js 主脚本
    ============================================================ -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ===== DOM 引用 =====
        const container = document.getElementById('canvas-container');
        const panel = document.getElementById('control-panel');
        const handleBtn = document.getElementById('panel-handle');
        const handleLabel = document.getElementById('handle-label');
        const toggleGridBtn = document.getElementById('toggle-grid-btn');
        const hoverDiv = document.getElementById('hover-coords');

        // ===== 场景 / 相机 / 渲染器 =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#050a14');

        const frustumSize = 16;
        let aspect = container.clientWidth / container.clientHeight;
        const camera = new THREE.OrthographicCamera(
            -frustumSize * aspect / 2,
            frustumSize * aspect / 2,
            frustumSize / 2,
            -frustumSize / 2,
            0.1, 100
        );
        camera.position.set(0, 0, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const cssRenderer = new CSS2DRenderer();
        cssRenderer.setSize(container.clientWidth, container.clientHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = '0';
        cssRenderer.domElement.style.left = '0';
        cssRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(cssRenderer.domElement);

        // ===== 控制器 =====
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.enablePan = true;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0, 0);

        // ===== 灯光 =====
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xbfe4ff, 1.2);
        dirLight.position.set(2, 5, 10);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.8);
        backLight.position.set(-3, 2, 8);
        scene.add(backLight);
        const colorLight1 = new THREE.PointLight(0xff44aa, 0.5);
        colorLight1.position.set(4, -2, 5);
        scene.add(colorLight1);
        const colorLight2 = new THREE.PointLight(0x00ccff, 0.7);
        colorLight2.position.set(-4, 3, 6);
        scene.add(colorLight2);

        // ===== 星空 =====
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i + 1] = (Math.random() - 0.5) * 200;
            starPositions[i + 2] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // ===== 分组 =====
        const gridGroup = new THREE.Group();
        const axisGroup = new THREE.Group();
        const curveGroup = new THREE.Group();
        const markersGroup = new THREE.Group();
        const symmetryGroup = new THREE.Group();
        const labelGroup = new THREE.Group();

        scene.add(gridGroup);
        scene.add(axisGroup);
        scene.add(curveGroup);
        scene.add(markersGroup);
        scene.add(symmetryGroup);
        scene.add(labelGroup);

        let gridVisible = true;

        // ===== 构建静态场景 (网格 / 轴 / 标签) =====
        function buildStaticScene() {
            const gridColor = 0x44ddff;
            const gridDivisions = 16;
            const gridSize = 16;
            const step = gridSize / gridDivisions;

            const gridMaterial = new THREE.LineBasicMaterial({ color: gridColor, transparent: true, opacity: 0.4 });
            const gridLines = [];
            for (let i = -gridSize / 2; i <= gridSize / 2; i += step) {
                gridLines.push(new THREE.Vector3(i, -gridSize / 2, -0.1));
                gridLines.push(new THREE.Vector3(i, gridSize / 2, -0.1));
                gridLines.push(new THREE.Vector3(-gridSize / 2, i, -0.1));
                gridLines.push(new THREE.Vector3(gridSize / 2, i, -0.1));
            }
            const gridGeo = new THREE.BufferGeometry().setFromPoints(gridLines);
            const gridLineSeg = new THREE.LineSegments(gridGeo, gridMaterial);
            gridGroup.add(gridLineSeg);

            const axisMatX = new THREE.LineBasicMaterial({ color: 0x00ffff });
            const axisMatY = new THREE.LineBasicMaterial({ color: 0xff44aa });
            const axisLength = 8.5;
            const xAxisPoints = [new THREE.Vector3(-axisLength, 0, 0), new THREE.Vector3(axisLength, 0, 0)];
            const yAxisPoints = [new THREE.Vector3(0, -axisLength, 0), new THREE.Vector3(0, axisLength, 0)];
            const xAxisLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(xAxisPoints), axisMatX);
            const yAxisLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(yAxisPoints), axisMatY);
            axisGroup.add(xAxisLine);
            axisGroup.add(yAxisLine);

            // 刻度标签
            for (let i = -8; i <= 8; i += 1) {
                if (i === 0) continue;
                const divX = document.createElement('div');
                divX.textContent = i;
                divX.style.color = '#aaf0ff';
                divX.style.fontSize = '13px';
                divX.style.fontWeight = 'bold';
                divX.style.textShadow = '0 0 12px #0cf';
                divX.style.fontFamily = 'monospace';
                divX.style.opacity = '0.7';
                const labelX = new CSS2DObject(divX);
                labelX.position.set(i, -0.3, 0);
                labelGroup.add(labelX);

                const divY = document.createElement('div');
                divY.textContent = i;
                divY.style.color = '#ffaad4';
                divY.style.fontSize = '13px';
                divY.style.fontWeight = 'bold';
                divY.style.textShadow = '0 0 12px #f6f';
                divY.style.fontFamily = 'monospace';
                divY.style.opacity = '0.7';
                const labelY = new CSS2DObject(divY);
                labelY.position.set(-0.45, i - 0.15, 0);
                labelGroup.add(labelY);
            }
            const originDiv = document.createElement('div');
            originDiv.textContent = '0';
            originDiv.style.color = '#fff';
            originDiv.style.fontSize = '13px';
            originDiv.style.textShadow = '0 0 15px #fff';
            originDiv.style.fontWeight = 'bold';
            const originLabel = new CSS2DObject(originDiv);
            originLabel.position.set(-0.3, -0.3, 0);
            labelGroup.add(originLabel);
        }
        buildStaticScene();

        // ===== 创建霓虹管 =====
        function createNeonTube(points, color, radius = 0.04) {
            const curve = new THREE.CatmullRomCurve3(points);
            const tubeGeo = new THREE.TubeGeometry(curve, 1200, radius, 16, false);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 1.4,
                roughness: 0.2,
                metalness: 0.1,
                transparent: true,
                opacity: 0.95
            });
            return new THREE.Mesh(tubeGeo, material);
        }

        // ===== 状态 =====
        let currentMode = 'linear';

        // ===== DOM 元素 =====
        const linearDiv = document.getElementById('linear-params');
        const quadDiv = document.getElementById('quad-params');
        const tabLinear = document.getElementById('tab-linear');
        const tabQuad = document.getElementById('tab-quadratic');
        const exprDiv = document.getElementById('func-expression');
        const extraInfoDiv = document.getElementById('extra-info');

        const kSlider = document.getElementById('k-slider');
        const bSlider = document.getElementById('b-slider');
        const aSlider = document.getElementById('a-slider');
        const b2Slider = document.getElementById('b2-slider');
        const cSlider = document.getElementById('c-slider');
        const kVal = document.getElementById('k-val');
        const bVal = document.getElementById('b-val');
        const aVal = document.getElementById('a-val');
        const b2Val = document.getElementById('b2-val');
        const cVal = document.getElementById('c-val');

        const resetBtn = document.getElementById('reset-btn');
        const randomBtn = document.getElementById('random-btn');

        // ===== 更新滑块数值显示 =====
        function updateSliderDisplay() {
            kVal.textContent = parseFloat(kSlider.value).toFixed(2);
            bVal.textContent = parseFloat(bSlider.value).toFixed(2);
            aVal.textContent = parseFloat(aSlider.value).toFixed(2);
            b2Val.textContent = parseFloat(b2Slider.value).toFixed(2);
            cVal.textContent = parseFloat(cSlider.value).toFixed(2);
        }

        // ===== 顶点浮窗 (二次函数专用) =====
        let vertexFloatEl = null;

        function updateVertexDisplay(h, k) {
            if (currentMode === 'quadratic') {
                if (!vertexFloatEl) {
                    const div = document.createElement('div');
                    div.id = 'vertex-f-display';
                    div.style.position = 'absolute';
                    div.style.bottom = '80px';
                    div.style.left = '16px';
                    div.style.background = 'rgba(4, 24, 38, 0.85)';
                    div.style.backdropFilter = 'blur(12px)';
                    div.style.webkitBackdropFilter = 'blur(12px)';
                    div.style.padding = '6px 16px';
                    div.style.borderRadius = '40px';
                    div.style.border = '1px solid #ff4d9a';
                    div.style.color = '#ffb3ff';
                    div.style.fontFamily = 'monospace';
                    div.style.fontSize = '0.8rem';
                    div.style.boxShadow = '0 0 30px #ff44ee66';
                    div.style.zIndex = '15';
                    div.style.pointerEvents = 'none';
                    div.style.whiteSpace = 'nowrap';
                    document.body.appendChild(div);
                    vertexFloatEl = div;
                }
                vertexFloatEl.innerHTML = `🎯 顶点 f(${h.toFixed(2)}) = ${k.toFixed(2)}`;
                vertexFloatEl.style.display = 'block';
            } else {
                if (vertexFloatEl) {
                    vertexFloatEl.style.display = 'none';
                }
            }
        }

        // ===== 核心渲染函数 =====
        function renderFunction() {
            // 清空曲线、标记、对称轴
            while (curveGroup.children.length) curveGroup.remove(curveGroup.children[0]);
            while (markersGroup.children.length) markersGroup.remove(markersGroup.children[0]);
            while (symmetryGroup.children.length) symmetryGroup.remove(symmetryGroup.children[0]);

            const xMin = -8.0,
                xMax = 8.0;
            const steps = 3000;

            if (currentMode === 'linear') {
                const k = parseFloat(kSlider.value);
                const b = parseFloat(bSlider.value);

                exprDiv.innerHTML = `y = ${k.toFixed(2)} x ${b >= 0 ? '+ ' : '- '} ${Math.abs(b).toFixed(2)}`;

                const points = [];
                for (let i = 0; i <= steps; i++) {
                    const x = xMin + (i / steps) * (xMax - xMin);
                    const y = k * x + b;
                    points.push(new THREE.Vector3(x, y, 0));
                }
                const tube = createNeonTube(points, 0x00ccff, 0.045);
                curveGroup.add(tube);

                // Y截距
                const yMarker = new THREE.Mesh(
                    new THREE.SphereGeometry(0.12, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff2299, emissiveIntensity: 1.5 })
                );
                yMarker.position.set(0, b, 0.1);
                markersGroup.add(yMarker);

                let xIntercept = null;
                if (Math.abs(k) > 0.001) {
                    xIntercept = -b / k;
                    if (Math.abs(xIntercept) <= 8.5) {
                        const xMarker = new THREE.Mesh(
                            new THREE.SphereGeometry(0.12, 16, 16),
                            new THREE.MeshStandardMaterial({ color: 0xaa66ff, emissive: 0xaa44ff, emissiveIntensity: 1.2 })
                        );
                        xMarker.position.set(xIntercept, 0, 0.1);
                        markersGroup.add(xMarker);
                    }
                }

                const xIntText = (xIntercept !== null && isFinite(xIntercept)) ? xIntercept.toFixed(2) : '—';
                extraInfoDiv.innerHTML =
                    `<span>Y截距: (0, ${b.toFixed(2)})</span><span>X截距: (${xIntText}, 0)</span>`;

                updateVertexDisplay(0, 0);

            } else {
                // 二次函数
                const a = parseFloat(aSlider.value);
                const b = parseFloat(b2Slider.value);
                const c = parseFloat(cSlider.value);

                exprDiv.innerHTML =
                    `y = ${a.toFixed(2)}x² ${b >= 0 ? '+ ' : '- '} ${Math.abs(b).toFixed(2)}x ${c >= 0 ? '+ ' : '- '} ${Math.abs(c).toFixed(2)}`;

                const points = [];
                for (let i = 0; i <= steps; i++) {
                    const x = xMin + (i / steps) * (xMax - xMin);
                    const y = a * x * x + b * x + c;
                    points.push(new THREE.Vector3(x, y, 0));
                }
                const tube = createNeonTube(points, 0xff44aa, 0.05);
                curveGroup.add(tube);

                const h = -b / (2 * a);
                const k = a * h * h + b * h + c;

                // 顶点标记
                const vMarker = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15, 20, 20),
                    new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xff8800, emissiveIntensity: 1.8 })
                );
                vMarker.position.set(h, k, 0.15);
                markersGroup.add(vMarker);

                // 对称轴虚线
                if (isFinite(h) && Math.abs(h) < 9) {
                    const dashMaterial = new THREE.LineDashedMaterial({
                        color: 0x88aaff,
                        dashSize: 0.08,
                        gapSize: 0.06,
                        transparent: true,
                        opacity: 0.5
                    });
                    const axisPoints = [new THREE.Vector3(h, -8.5, 0), new THREE.Vector3(h, 8.5, 0)];
                    const lineGeo = new THREE.BufferGeometry().setFromPoints(axisPoints);
                    const dashLine = new THREE.Line(lineGeo, dashMaterial);
                    dashLine.computeLineDistances();
                    symmetryGroup.add(dashLine);
                }

                // Y截距
                const yInt = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 12, 12),
                    new THREE.MeshStandardMaterial({ color: 0x66ccff, emissive: 0x2288ff, emissiveIntensity: 1.0 })
                );
                yInt.position.set(0, c, 0.1);
                markersGroup.add(yInt);

                const dir = a > 0 ? '↑ 开口向上' : '↓ 开口向下';
                extraInfoDiv.innerHTML =
                    `<span>🔷 顶点 (${h.toFixed(2)}, ${k.toFixed(2)})</span><span>📐 对称轴 x=${h.toFixed(2)}</span><span>${dir}</span>`;

                updateVertexDisplay(h, k);
            }

            updateSliderDisplay();
        }

        // ===== 事件绑定 =====
        function bindEvents() {
            const inputs = [kSlider, bSlider, aSlider, b2Slider, cSlider];
            inputs.forEach(s => s.addEventListener('input', () => {
                updateSliderDisplay();
                renderFunction();
            }));

            tabLinear.addEventListener('click', () => {
                currentMode = 'linear';
                linearDiv.classList.remove('hidden');
                quadDiv.classList.add('hidden');
                tabLinear.classList.add('active');
                tabQuad.classList.remove('active');
                if (vertexFloatEl) vertexFloatEl.style.display = 'none';
                renderFunction();
            });

            tabQuad.addEventListener('click', () => {
                currentMode = 'quadratic';
                linearDiv.classList.add('hidden');
                quadDiv.classList.remove('hidden');
                tabLinear.classList.remove('active');
                tabQuad.classList.add('active');
                renderFunction();
            });

            resetBtn.addEventListener('click', () => {
                if (currentMode === 'linear') {
                    kSlider.value = '1.0';
                    bSlider.value = '0.0';
                } else {
                    aSlider.value = '1.0';
                    b2Slider.value = '0.0';
                    cSlider.value = '0.0';
                }
                updateSliderDisplay();
                renderFunction();
            });

            randomBtn.addEventListener('click', () => {
                if (currentMode === 'linear') {
                    kSlider.value = (Math.random() * 6 - 3).toFixed(2);
                    bSlider.value = (Math.random() * 6 - 3).toFixed(2);
                } else {
                    aSlider.value = (Math.random() * 4 - 2).toFixed(2);
                    b2Slider.value = (Math.random() * 6 - 3).toFixed(2);
                    cSlider.value = (Math.random() * 6 - 3).toFixed(2);
                    if (parseFloat(aSlider.value) === 0) aSlider.value = '0.5';
                }
                updateSliderDisplay();
                renderFunction();
            });

            // 网格切换
            toggleGridBtn.addEventListener('click', () => {
                gridVisible = !gridVisible;
                gridGroup.visible = gridVisible;
                toggleGridBtn.textContent = gridVisible ? '🌐 隐藏网格' : '🌐 显示网格';
            });

            // ===== 面板折叠 (移动端) =====
            let panelOpen = false;
            const isMobile = window.innerWidth <= 820;

            function togglePanel(open) {
                panelOpen = (open !== undefined) ? open : !panelOpen;
                panel.classList.toggle('open', panelOpen);
                handleLabel.textContent = panelOpen ? '收起参数' : '展开参数';
                // 调整手柄箭头方向感
                const bar = handleBtn.querySelector('.handle-bar');
                if (bar) {
                    bar.style.transform = panelOpen ? 'rotate(180deg)' : 'rotate(0deg)';
                    bar.style.transition = 'transform 0.3s ease';
                }
            }

            // 点击手柄切换
            handleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePanel();
            });

            // 在移动端，点击面板外部不收起 (避免误触)
            // 但点击手柄本身会切换

            // 窗口变化时重置面板状态 (桌面/移动切换)
            window.addEventListener('resize', () => {
                const nowMobile = window.innerWidth <= 820;
                if (!nowMobile && panelOpen) {
                    // 切换到桌面时强制收起
                    togglePanel(false);
                }
                if (nowMobile && !panelOpen) {
                    // 切换到移动时默认收起 (已经收起)
                }
                // 更新相机
                onWindowResize();
            });

            // 初始状态：移动端默认收起，桌面端默认展开 (但桌面端没有手柄，面板始终可见)
            if (isMobile) {
                togglePanel(false);
            } else {
                panel.classList.add('open');
                handleLabel.textContent = '展开参数';
            }

            // 触摸滑动优化：防止面板内滚动时连带页面滚动
            const scrollEl = document.getElementById('panel-scroll');
            if (scrollEl) {
                scrollEl.addEventListener('touchstart', (e) => {
                    e.stopPropagation();
                }, { passive: true });
            }
        }

        // ===== 鼠标悬停坐标 =====
        const raycaster = new THREE.Raycaster();
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const targetPoint = new THREE.Vector3();

        renderer.domElement.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.ray.intersectPlane(plane, targetPoint)) {
                const x = targetPoint.x.toFixed(2);
                const y = targetPoint.y.toFixed(2);
                hoverDiv.innerHTML = `🌐 坐标 ( ${x} , ${y} )`;
            } else {
                hoverDiv.innerHTML = `⟳ 悬停查看坐标`;
            }
        });

        // 触摸设备上，移动手指时更新坐标
        renderer.domElement.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (!touch) return;
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.ray.intersectPlane(plane, targetPoint)) {
                const x = targetPoint.x.toFixed(2);
                const y = targetPoint.y.toFixed(2);
                hoverDiv.innerHTML = `🌐 坐标 ( ${x} , ${y} )`;
            }
        }, { passive: true });

        // ===== 窗口自适应 =====
        function onWindowResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            cssRenderer.setSize(width, height);
            const newAspect = width / height;
            camera.left = -frustumSize * newAspect / 2;
            camera.right = frustumSize * newAspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
        }

        window.addEventListener('resize', onWindowResize);

        // ===== 启动 =====
        bindEvents();
        updateSliderDisplay();
        renderFunction();
        onWindowResize();

        // ===== 动画循环 =====
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
        }
        animate();

        // 监听面板展开/收起，调整网格按钮位置 (通过CSS已处理)
        console.log('✨ 函数可视化 · 移动端优化版');
    </script>
</body>
</html>
