<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>口算练习丨Twolobster · EduMath</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f9;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 24px 20px;
            color: #0f172a;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 顶部标题卡片 - 默认橘色主题 */
        .hero-card {
            background: linear-gradient(135deg, #ff9a3c 0%, #ff6b6b 100%);
            border-radius: 48px;
            padding: 20px 32px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.2);
            transition: background 0.3s ease;
        }
        .hero-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .hero-badge {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 500;
        }
        .hero-sub {
            opacity: 0.85;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* 卡片 */
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 22px 26px;
            transition: all 0.2s;
            border: 1px solid #eef2ff;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 5px solid #3b82f6;
            padding-left: 16px;
            letter-spacing: -0.3px;
        }

        /* 设置区 */
        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .setting-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .setting-group input,
        .setting-group select {
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            background: #f8fafc;
            min-width: 80px;
            transition: border 0.2s;
        }
        .setting-group input:focus,
        .setting-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .type-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .type-btn {
            padding: 9px 18px;
            border-radius: 40px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            transition: all 0.2s;
            white-space: nowrap;
            color: #475569;
        }
        .type-btn:hover {
            border-color: #ff9a3c;
            background: #fff7ed;
        }
        /* active 样式由 JavaScript 内联控制，此处只保留基础色作为 fallback */
        .type-btn.active {
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        /* 倒计时区域 */
        .timer-section {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            padding: 10px 0;
        }
        .timer-display {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
            color: #0f172a;
            min-width: 180px;
            text-align: center;
            transition: color 0.3s;
            line-height: 1;
        }
        .timer-display.warning {
            color: #ef4444;
            animation: pulse-warning 0.8s ease-in-out infinite;
        }
        .timer-display.paused-blur {
            color: #94a3b8;
        }
        @keyframes pulse-warning {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
                opacity: 0.75;
            }
        }
        .timer-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #64748b;
            text-align: center;
        }
        .btn-timer {
            padding: 12px 28px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
            justify-content: center;
        }
        .btn-start {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .btn-start:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        .btn-pause {
            background: #f59e0b;
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .btn-pause:hover {
            background: #d97706;
            transform: translateY(-1px);
        }
        .btn-reset {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
        }
        .btn-reset:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }
        .btn-answer {
            background: #6366f1;
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .btn-answer:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }
        .btn-generate {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-generate:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        .btn-timer:active {
            transform: scale(0.96);
        }
        .btn-timer:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 速查表按钮样式 */
        .btn-toggle-table {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            background: #eef2ff;
            color: #3b82f6;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            margin-right: 12px;
            margin-bottom: 8px;
        }
        .btn-toggle-table:hover {
            background: #dbeafe;
            transform: translateY(-1px);
        }
        .btn-toggle-table.active-toggle {
            background: #3b82f6;
            color: white;
        }

        /* 暂停遮罩 */
        .questions-wrapper {
            position: relative;
        }
        .pause-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: #f59e0b;
            letter-spacing: 1px;
            pointer-events: all;
            cursor: default;
            transition: opacity 0.3s;
        }
        .pause-overlay span {
            background: white;
            padding: 16px 36px;
            border-radius: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        /* 题目网格 */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            min-height: 100px;
        }
        .q-card {
            background: #fafcff;
            border-radius: 24px;
            padding: 16px 18px;
            border: 2px solid #e2edff;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.25s;
            position: relative;
        }
        .q-card.correct-flash {
            border-color: #10b981 !important;
            background: #ecfdf5 !important;
            animation: flash-green 0.6s ease;
        }
        .q-card.wrong-flash {
            border-color: #ef4444 !important;
            background: #fef2f2 !important;
            animation: flash-red 0.6s ease;
        }
        .q-card.unanswered-flash {
            border-color: #f59e0b !important;
            background: #fffbeb !important;
        }
        @keyframes flash-green {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
        }
        @keyframes flash-red {
            0%,
            100% {
                transform: scale(1);
            }
            30% {
                transform: translateX(-3px);
            }
            60% {
                transform: translateX(3px);
            }
        }
        .q-number {
            font-weight: 800;
            font-size: 1rem;
            background: #eef2ff;
            color: #3b82f6;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .q-text {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            flex: 1;
            min-width: 60px;
            word-break: keep-all;
        }
        .q-input {
            width: 90px;
            padding: 10px 14px;
            border-radius: 40px;
            border: 2px solid #e2e8f0;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            background: white;
            transition: border 0.2s;
            flex-shrink: 0;
        }
        .q-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }
        .q-input:disabled {
            background: #f1f5f9;
            color: #64748b;
        }
        .q-answer-badge {
            font-size: 0.78rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 40px;
            flex-shrink: 0;
            min-width: 50px;
            text-align: center;
            display: none;
        }
        .q-answer-badge.visible {
            display: inline-block;
            background: #dbeafe;
            color: #1d4ed8;
        }
        .q-answer-badge.user-correct {
            background: #bbf7d0;
            color: #15803d;
        }
        .q-answer-badge.user-wrong {
            background: #fecaca;
            color: #b91c1c;
        }
        .q-result-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
            display: none;
        }
        .q-result-icon.visible {
            display: inline;
        }

        /* 得分面板 */
        .score-panel {
            display: none;
            background: linear-gradient(135deg, #eef2ff, #ffffff);
            border-radius: 32px;
            padding: 20px 24px;
            margin-top: 8px;
            text-align: center;
            border: 2px solid #e2edff;
        }
        .score-panel.visible {
            display: block;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .score-big {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .score-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 10px;
        }
        .stat-badge {
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .stat-correct {
            background: #bbf7d0;
            color: #15803d;
        }
        .stat-wrong {
            background: #fecaca;
            color: #b91c1c;
        }
        .stat-unanswered {
            background: #fef3c7;
            color: #92400e;
        }
        .stat-total {
            background: #eef2ff;
            color: #3b82f6;
        }

        /* 速查表表格样式 */
        .ref-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .ref-table th {
            background: #eef2ff;
            padding: 8px 6px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
        }
        .ref-table td {
            padding: 8px 6px;
            background: white;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 500;
        }
        .ref-table tr:last-child td {
            border-bottom: none;
        }
        .ref-table .highlight-cell {
            background: #fff7ed;
            font-weight: 700;
        }
        .table-wrapper {
            margin-top: 12px;
            overflow-x: auto;
            border-radius: 24px;
            -webkit-overflow-scrolling: touch;
        }

        /* 底部 */
        .footer-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
        }
        .copyright {
            font-size: 0.78rem;
            color: #64748b;
        }
        .theme-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }
        .theme-btn:hover {
            transform: scale(1.15);
        }
        .theme-btn.active-theme-dot {
            border: 3px solid #0f172a;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        /* 主题 - body class */
        body.theme-pink {
            background: #fdf2f8;
        }
        body.theme-grayblue {
            background: #eef2f7;
        }
        body.theme-mint {
            background: #ecfdf5;
        }
        body.theme-purple {
            background: #faf5ff;
        }

        /* 响应式 */
        @media (max-width: 750px) {
            body {
                padding: 14px 10px;
            }
            .card {
                padding: 14px 16px;
                border-radius: 24px;
            }
            .hero-card {
                padding: 14px 18px;
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                border-radius: 32px;
            }
            .hero-title {
                font-size: 1.2rem;
            }
            .hero-sub {
                font-size: 0.7rem;
            }
            .hero-badge {
                font-size: 0.7rem;
                padding: 3px 10px;
            }
            .section-title {
                font-size: 1.1rem;
                margin-bottom: 10px;
                padding-left: 12px;
            }
            .questions-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .q-card {
                padding: 12px 14px;
                gap: 8px;
                border-radius: 20px;
            }
            .q-text {
                font-size: 1rem;
            }
            .q-input {
                width: 70px;
                font-size: 0.95rem;
                padding: 8px 10px;
            }
            .timer-display {
                font-size: 3rem;
                min-width: 130px;
            }
            .btn-timer {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
            .type-btn {
                padding: 7px 13px;
                font-size: 0.72rem;
            }
            .settings-row {
                gap: 10px;
            }
            .footer-toolbar {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .theme-buttons {
                justify-content: center;
            }
            .btn-toggle-table {
                padding: 8px 16px;
                font-size: 0.8rem;
                margin-right: 6px;
            }
            .ref-table {
                font-size: 0.7rem;
            }
            .ref-table th,
            .ref-table td {
                padding: 6px 4px;
            }
        }
        @media (max-width: 400px) {
            .timer-display {
                font-size: 2.4rem;
                min-width: 100px;
            }
            .q-text {
                font-size: 0.9rem;
            }
            .q-input {
                width: 56px;
                font-size: 0.85rem;
                padding: 6px 8px;
            }
            .q-number {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
            .btn-timer {
                padding: 8px 14px;
                font-size: 0.78rem;
                min-width: 70px;
            }
            .btn-toggle-table {
                padding: 6px 14px;
                font-size: 0.75rem;
            }
            .ref-table {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题 -->
        <div class="hero-card" id="heroCard">
            <div class="hero-title">
                口算练习
                <span class="hero-badge">EduMath</span>
            </div>
            <div class="hero-sub">计时挑战 · 多种题型 · 即时核对</div>
        </div>

        <!-- 设置卡片 -->
        <div class="card">
            <div class="section-title">⚙️ 练习设置</div>
            <div class="settings-row">
                <div class="setting-group">
                    <label>题目数量</label>
                    <input type="number" id="questionCount" value="10" min="1" max="100" step="1">
                </div>
                <div class="setting-group">
                    <label>倒计时 (分钟)</label>
                    <input type="number" id="timerMinutes" value="1" min="0.1" max="60" step="0.5">
                </div>
                <div class="setting-group" style="flex:1; min-width:200px;">
                    <label>题目类型</label>
                    <div class="type-buttons" id="typeButtons">
                        <button class="type-btn active" data-type="100以内加减法">100以内加减法</button>
                        <button class="type-btn" data-type="20以内加减法">20以内加减法</button>
                        <button class="type-btn" data-type="乘法口诀乘除法">乘法口诀乘除法</button>
                        <button class="type-btn" data-type="平方数口算">平方数口算 (10-25)</button>
                        <button class="type-btn" data-type="四位数加法">四位数+四位数</button>
                        <!-- 修改：显示文字改为 "三位数÷一位数" -->
                        <button class="type-btn" data-type="3位数除以1位数">三位数÷一位数</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 计时器卡片 -->
        <div class="card">
            <div class="section-title">⏱️ 倒计时</div>
            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">01:00</div>
                <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
                    <button class="btn-timer btn-start" id="startBtn">开始</button>
                    <button class="btn-timer btn-pause" id="pauseBtn" disabled>暂停</button>
                    <button class="btn-timer btn-reset" id="resetBtn">重置</button>
                    <button class="btn-timer btn-answer" id="answerBtn">查看答案</button>
                    <button class="btn-timer btn-generate" id="generateBtn">生成新题</button>
                </div>
                <div class="timer-label" id="timerStatus">准备就绪 · 点击"开始"启动计时</div>
            </div>
        </div>

        <!-- 题目区域 -->
        <div class="card questions-wrapper" id="questionsWrapper">
            <div class="section-title">📝 题目列表</div>
            <div class="questions-grid" id="questionsGrid">
                <div style="grid-column:1/-1; text-align:center; padding:40px; color:#94a3b8;">
                    点击「生成新题」开始练习吧
                </div>
            </div>
            <div class="pause-overlay" id="pauseOverlay" style="display:none;">
                <span>已暂停</span>
            </div>
            <!-- 得分面板 -->
            <div class="score-panel" id="scorePanel">
                <div style="font-weight:700; color:#64748b; margin-bottom:6px;">练习结果</div>
                <div class="score-big" id="scoreBig">--</div>
                <div class="score-stats" id="scoreStats"></div>
            </div>
        </div>

        <!-- 速查表卡片 -->
        <div class="card">
            <div class="section-title">📚 速查表</div>
            <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:8px;">
                <button id="toggleSquareBtn" class="btn-toggle-table" aria-expanded="false">展开 10-25 平方数表</button>
                <button id="toggleMultiBtn" class="btn-toggle-table" aria-expanded="false">展开 11-20 乘法口诀表</button>
                <button id="toggleSpecialBtn" class="btn-toggle-table" aria-expanded="false">展开 24·25 乘法表</button>
            </div>
            <!-- 平方数表 -->
            <div id="squareTable" style="display:none;">
                <div class="table-wrapper">
                    <table class="ref-table">
                        <thead><tr><th>数字</th><th>平方</th></tr></thead>
                        <tbody id="squareTableBody"></tbody>
                    </table>
                </div>
            </div>
            <!-- 11-20 乘法口诀表 -->
            <div id="multiTable" style="display:none; margin-top:20px;">
                <div class="table-wrapper">
                    <table class="ref-table" id="multiTableContent">
                        <thead id="multiTableHead"></thead>
                        <tbody id="multiTableBody"></tbody>
                    </table>
                </div>
            </div>
            <!-- 24·25 乘法表 -->
            <div id="specialTable" style="display:none; margin-top:20px;">
                <div class="table-wrapper">
                    <table class="ref-table" id="specialTableContent">
                        <thead id="specialTableHead"></thead>
                        <tbody id="specialTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 底部工具栏 -->
        <div class="footer-toolbar">
            <div class="copyright">© Twolobster丨EduMath Mental Math</div>
            <div class="theme-buttons">
                <span style="font-size:0.75rem; color:#64748b;">🎨 主题：</span>
                <div class="theme-btn active-theme-dot" style="background: linear-gradient(135deg, #ff9a3c, #ff6b6b);" data-theme="orange" title="橘色"></div>
                <div class="theme-btn" style="background: linear-gradient(135deg, #ff9a9e, #fecfef);" data-theme="pink" title="粉色"></div>
                <div class="theme-btn" style="background: linear-gradient(135deg, #2c3e50, #3498db);" data-theme="grayblue" title="灰蓝"></div>
                <div class="theme-btn" style="background: linear-gradient(135deg, #11998e, #38ef7d);" data-theme="mint" title="薄荷"></div>
                <div class="theme-btn" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);" data-theme="purple" title="紫色"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ 全局主题颜色配置 ============
            const THEME_COLORS = {
                'orange': { bg: '#ff9a3c', border: '#ff9a3c' },
                'pink': { bg: '#ff9a9e', border: '#ff9a9e' },
                'grayblue': { bg: '#3498db', border: '#3498db' },
                'mint': { bg: '#11998e', border: '#11998e' },
                'purple': { bg: '#a18cd1', border: '#a18cd1' },
            };
            let currentTheme = 'orange';

            // ============ 状态变量 ============
            let questions = [];
            let currentType = '100以内加减法';
            let totalSeconds = 60;
            let remainingSeconds = 60;
            let timerInterval = null;
            let isRunning = false;
            let isPaused = false;
            let isFinished = false;
            let answersRevealed = false;
            let audioCtx = null;
            let activeTypeBtn = null; // 当前选中的题型按钮

            // ============ DOM 引用 ============
            const questionCountInput = document.getElementById('questionCount');
            const timerMinutesInput = document.getElementById('timerMinutes');
            const typeButtons = document.getElementById('typeButtons');
            const timerDisplay = document.getElementById('timerDisplay');
            const timerStatus = document.getElementById('timerStatus');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const answerBtn = document.getElementById('answerBtn');
            const generateBtn = document.getElementById('generateBtn');
            const questionsGrid = document.getElementById('questionsGrid');
            const pauseOverlay = document.getElementById('pauseOverlay');
            const scorePanel = document.getElementById('scorePanel');
            const scoreBig = document.getElementById('scoreBig');
            const scoreStats = document.getElementById('scoreStats');
            const heroCard = document.getElementById('heroCard');
            const toggleSquareBtn = document.getElementById('toggleSquareBtn');
            const toggleMultiBtn = document.getElementById('toggleMultiBtn');
            const toggleSpecialBtn = document.getElementById('toggleSpecialBtn');
            const squareTable = document.getElementById('squareTable');
            const multiTable = document.getElementById('multiTable');
            const specialTable = document.getElementById('specialTable');

            // ============ 初始化 AudioContext ============
            function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                return audioCtx;
            }

            function playBeep(frequency, duration, startTime) {
                try {
                    const ctx = getAudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = frequency;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.35, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                } catch (e) { /* 静默处理 */ }
            }

            function playAlertSound() {
                try {
                    const ctx = getAudioContext();
                    const now = ctx.currentTime;
                    playBeep(880, 0.25, now);
                    playBeep(880, 0.25, now + 0.3);
                    playBeep(880, 0.4, now + 0.6);
                    const oscHigh = ctx.createOscillator();
                    const gainHigh = ctx.createGain();
                    oscHigh.connect(gainHigh);
                    gainHigh.connect(ctx.destination);
                    oscHigh.frequency.value = 1100;
                    oscHigh.type = 'sine';
                    gainHigh.gain.setValueAtTime(0.4, now + 1.1);
                    gainHigh.gain.exponentialRampToValueAtTime(0.01, now + 1.6);
                    oscHigh.start(now + 1.1);
                    oscHigh.stop(now + 1.6);
                } catch (e) { /* 静默处理 */ }
            }

            // ============ 工具：清除所有题型按钮的内联样式 ============
            function clearAllTypeBtnInlineStyles() {
                typeButtons.querySelectorAll('.type-btn').forEach(b => {
                    b.style.background = '';
                    b.style.borderColor = '';
                });
            }

            // ============ 工具：设置单个按钮的主题色 ============
            function applyThemeToBtn(btn, themeName) {
                if (!btn) return;
                const colors = THEME_COLORS[themeName] || THEME_COLORS['orange'];
                btn.style.background = colors.bg;
                btn.style.borderColor = colors.border;
            }

            // ============ 工具：更新当前 active 按钮的颜色 ============
            function updateActiveBtnTheme() {
                const activeBtn = typeButtons.querySelector('.type-btn.active');
                if (activeBtn) {
                    applyThemeToBtn(activeBtn, currentTheme);
                    activeTypeBtn = activeBtn;
                } else {
                    activeTypeBtn = null;
                }
            }

            // ============ 题目生成 ============
            function randInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function generateQuestions() {
                const count = parseInt(questionCountInput.value) || 20;
                const type = currentType;
                const qs = [];

                switch (type) {
                    case '100以内加减法':
                        for (let i = 0; i < count; i++) {
                            const isAdd = Math.random() > 0.5;
                            if (isAdd) {
                                const a = randInt(5, 90);
                                const b = randInt(3, 99 - a);
                                qs.push({ text: `${a} + ${b} = ?`, answer: a + b, userAnswer: null });
                            } else {
                                const a = randInt(10, 99);
                                const b = randInt(1, a);
                                qs.push({ text: `${a} - ${b} = ?`, answer: a - b, userAnswer: null });
                            }
                        }
                        break;
                    case '20以内加减法':
                        for (let i = 0; i < count; i++) {
                            const isAdd = Math.random() > 0.5;
                            if (isAdd) {
                                const a = randInt(2, 18);
                                const b = randInt(1, 20 - a);
                                qs.push({ text: `${a} + ${b} = ?`, answer: a + b, userAnswer: null });
                            } else {
                                const a = randInt(5, 20);
                                const b = randInt(1, a);
                                qs.push({ text: `${a} - ${b} = ?`, answer: a - b, userAnswer: null });
                            }
                        }
                        break;
                    case '乘法口诀乘除法':
                        for (let i = 0; i < count; i++) {
                            const isMult = Math.random() > 0.45;
                            const a = randInt(1, 9);
                            const b = randInt(1, 9);
                            if (isMult) {
                                qs.push({ text: `${a} × ${b} = ?`, answer: a * b, userAnswer: null });
                            } else {
                                const product = a * b;
                                const divisor = randInt(0, 1) === 0 ? a : b;
                                qs.push({ text: `${product} ÷ ${divisor} = ?`, answer: product / divisor,
                                    userAnswer: null });
                            }
                        }
                        break;
                    case '平方数口算':
                        for (let i = 0; i < count; i++) {
                            const n = randInt(10, 25);
                            qs.push({ text: `${n}² = ?`, answer: n * n, userAnswer: null });
                        }
                        break;
                    case '四位数加法':
                        for (let i = 0; i < count; i++) {
                            const a = randInt(1000, 9999);
                            const b = randInt(1000, 9999);
                            qs.push({ text: `${a} + ${b} = ?`, answer: a + b, userAnswer: null });
                        }
                        break;
                    case '3位数除以1位数':
                        for (let i = 0; i < count; i++) {
                            const d = randInt(1, 9);
                            const minQ = Math.ceil(100 / d);
                            const maxQ = Math.floor(999 / d);
                            const q = randInt(minQ, maxQ);
                            const dividend = d * q;
                            qs.push({ text: `${dividend} ÷ ${d} = ?`, answer: q, userAnswer: null });
                        }
                        break;
                    default:
                        for (let i = 0; i < count; i++) {
                            const a = randInt(5, 90);
                            const b = randInt(3, 99 - a);
                            qs.push({ text: `${a} + ${b} = ?`, answer: a + b, userAnswer: null });
                        }
                }
                return qs;
            }

            // ============ 渲染题目 ============
            function renderQuestions() {
                questionsGrid.innerHTML = '';
                if (questions.length === 0) {
                    questionsGrid.innerHTML =
                        '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#94a3b8;">点击「生成新题」开始练习吧</div>';
                    return;
                }
                questions.forEach((q, idx) => {
                    const card = document.createElement('div');
                    card.className = 'q-card';
                    card.id = `q-card-${idx}`;
                    card.innerHTML = `
                        <div class="q-number">${idx + 1}</div>
                        <span class="q-text">${escapeHtml(q.text)}</span>
                        <input type="text" class="q-input" id="q-input-${idx}" placeholder="?" 
                               ${isFinished ? 'disabled' : ''} 
                               value="${q.userAnswer !== null ? q.userAnswer : ''}"
                               autocomplete="off" inputmode="numeric">
                        <span class="q-answer-badge" id="q-badge-${idx}">${q.answer}</span>
                        <span class="q-result-icon" id="q-icon-${idx}"></span>
                    `;
                    questionsGrid.appendChild(card);

                    const inputEl = card.querySelector(`#q-input-${idx}`);
                    inputEl.addEventListener('input', (e) => {
                        if (isFinished) {
                            e.target.value = q.userAnswer !== null ? q.userAnswer : '';
                            return;
                        }
                        const val = e.target.value.trim();
                        if (val === '' || val === '-') {
                            q.userAnswer = null;
                        } else {
                            const num = parseFloat(val);
                            if (!isNaN(num)) {
                                q.userAnswer = num;
                            } else {
                                q.userAnswer = null;
                            }
                        }
                    });

                    if (answersRevealed || isFinished) {
                        updateBadge(idx, q);
                    }
                });

                if (answersRevealed || isFinished) {
                    refreshAllBadges();
                }
                if (isPaused && !isRunning && !isFinished) {
                    pauseOverlay.style.display = 'flex';
                }
            }

            function updateBadge(idx, q) {
                const badge = document.getElementById(`q-badge-${idx}`);
                const icon = document.getElementById(`q-icon-${idx}`);
                const card = document.getElementById(`q-card-${idx}`);
                if (!badge || !icon || !card) return;
                badge.classList.add('visible');
                badge.textContent = q.answer;
                icon.classList.add('visible');

                if (q.userAnswer !== null && Number(q.userAnswer) === q.answer) {
                    badge.className = 'q-answer-badge visible user-correct';
                    icon.textContent = '✅';
                    icon.className = 'q-result-icon visible';
                    card.classList.add('correct-flash');
                    card.classList.remove('wrong-flash', 'unanswered-flash');
                } else if (q.userAnswer !== null && Number(q.userAnswer) !== q.answer) {
                    badge.className = 'q-answer-badge visible user-wrong';
                    icon.textContent = '❌';
                    icon.className = 'q-result-icon visible';
                    card.classList.add('wrong-flash');
                    card.classList.remove('correct-flash', 'unanswered-flash');
                } else {
                    badge.className = 'q-answer-badge visible';
                    icon.textContent = '⬜';
                    icon.className = 'q-result-icon visible';
                    card.classList.add('unanswered-flash');
                    card.classList.remove('correct-flash', 'wrong-flash');
                }
            }

            function refreshAllBadges() {
                questions.forEach((q, idx) => updateBadge(idx, q));
            }

            function revealAnswers() {
                answersRevealed = true;
                refreshAllBadges();
                questions.forEach((q, idx) => {
                    const inputEl = document.getElementById(`q-input-${idx}`);
                    if (inputEl) inputEl.disabled = true;
                });
                updateScorePanel();
            }

            function hideAnswers() {
                answersRevealed = false;
                questions.forEach((q, idx) => {
                    const badge = document.getElementById(`q-badge-${idx}`);
                    const icon = document.getElementById(`q-icon-${idx}`);
                    const card = document.getElementById(`q-card-${idx}`);
                    const inputEl = document.getElementById(`q-input-${idx}`);
                    if (badge) badge.classList.remove('visible', 'user-correct', 'user-wrong');
                    if (icon) icon.classList.remove('visible');
                    if (card) card.classList.remove('correct-flash', 'wrong-flash', 'unanswered-flash');
                    if (inputEl && !isFinished) inputEl.disabled = false;
                });
                scorePanel.classList.remove('visible');
            }

            function updateScorePanel() {
                let correct = 0;
                let wrong = 0;
                let unanswered = 0;
                questions.forEach(q => {
                    if (q.userAnswer === null || q.userAnswer === '') {
                        unanswered++;
                    } else if (Number(q.userAnswer) === q.answer) {
                        correct++;
                    } else {
                        wrong++;
                    }
                });
                const total = questions.length;
                const rate = total > 0 ? Math.round((correct / total) * 100) : 0;

                scoreBig.textContent = total > 0 ? `${rate}分` : '--';
                scoreBig.style.color = rate >= 90 ? '#10b981' : rate >= 60 ? '#f59e0b' : '#ef4444';
                scoreStats.innerHTML = `
                    <span class="stat-badge stat-correct">✅ 正确: ${correct}</span>
                    <span class="stat-badge stat-wrong">❌ 错误: ${wrong}</span>
                    <span class="stat-badge stat-unanswered">⬜ 未答: ${unanswered}</span>
                    <span class="stat-badge stat-total">📋 总题: ${total}</span>
                `;
                scorePanel.classList.add('visible');
            }

            // ============ 计时器逻辑 ============
            function updateTimerDisplay() {
                const mins = Math.floor(remainingSeconds / 60);
                const secs = remainingSeconds % 60;
                timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

                if (remainingSeconds <= 10 && isRunning && !isPaused) {
                    timerDisplay.classList.add('warning');
                } else {
                    timerDisplay.classList.remove('warning');
                }
                if (isPaused && !isFinished) {
                    timerDisplay.classList.add('paused-blur');
                } else {
                    timerDisplay.classList.remove('paused-blur');
                }
            }

            function startTimer() {
                if (isRunning && !isPaused) return;
                if (isFinished) {
                    resetAll();
                }
                if (questions.length === 0) {
                    alert('请先生成题目！');
                    return;
                }
                if (isPaused) {
                    resumeTimer();
                    return;
                }

                isRunning = true;
                isPaused = false;
                isFinished = false;
                answersRevealed = false;
                hideAnswers();
                remainingSeconds = parseInt(timerMinutesInput.value * 60) || 60;
                totalSeconds = remainingSeconds;
                updateTimerDisplay();
                pauseOverlay.style.display = 'none';

                questions.forEach((q, idx) => {
                    const inputEl = document.getElementById(`q-input-${idx}`);
                    if (inputEl) inputEl.disabled = false;
                });

                startBtn.disabled = true;
                pauseBtn.disabled = false;
                answerBtn.disabled = false;
                timerStatus.textContent = '⏳ 计时中...';

                timerInterval = setInterval(() => {
                    remainingSeconds--;
                    updateTimerDisplay();
                    if (remainingSeconds <= 0) {
                        finishTimer();
                    }
                }, 1000);
            }

            function pauseTimer() {
                if (!isRunning || isFinished) return;
                if (isPaused) return;
                isPaused = true;
                clearInterval(timerInterval);
                timerInterval = null;
                pauseOverlay.style.display = 'flex';
                pauseBtn.textContent = '继续';
                timerStatus.textContent = '已暂停 · 点击"继续"恢复计时';
                startBtn.disabled = true;
                updateTimerDisplay();
            }

            function resumeTimer() {
                if (!isPaused || isFinished) return;
                isPaused = false;
                pauseOverlay.style.display = 'none';
                pauseBtn.textContent = '暂停';
                timerStatus.textContent = '⏳ 计时中...';
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                updateTimerDisplay();

                timerInterval = setInterval(() => {
                    remainingSeconds--;
                    updateTimerDisplay();
                    if (remainingSeconds <= 0) {
                        finishTimer();
                    }
                }, 1000);
            }

            function finishTimer() {
                isRunning = false;
                isPaused = false;
                isFinished = true;
                clearInterval(timerInterval);
                timerInterval = null;
                remainingSeconds = 0;
                updateTimerDisplay();
                timerDisplay.classList.remove('warning', 'paused-blur');
                pauseOverlay.style.display = 'none';
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                pauseBtn.textContent = '暂停';
                answerBtn.disabled = true;
                timerStatus.textContent = '时间到！练习结束';
                revealAnswers();
                questions.forEach((q, idx) => {
                    const inputEl = document.getElementById(`q-input-${idx}`);
                    if (inputEl) inputEl.disabled = true;
                });
                playAlertSound();
            }

            function resetAll() {
                clearInterval(timerInterval);
                timerInterval = null;
                isRunning = false;
                isPaused = false;
                isFinished = false;
                answersRevealed = false;
                remainingSeconds = parseInt(timerMinutesInput.value * 60) || 60;
                totalSeconds = remainingSeconds;
                updateTimerDisplay();
                timerDisplay.classList.remove('warning', 'paused-blur');
                pauseOverlay.style.display = 'none';
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                pauseBtn.textContent = '暂停';
                answerBtn.disabled = false;
                timerStatus.textContent = '准备就绪 · 点击"开始"启动计时';
                hideAnswers();
                scorePanel.classList.remove('visible');
                questions.forEach(q => { q.userAnswer = null; });
                questions.forEach((q, idx) => {
                    const inputEl = document.getElementById(`q-input-${idx}`);
                    if (inputEl) {
                        inputEl.disabled = false;
                        inputEl.value = '';
                    }
                    const card = document.getElementById(`q-card-${idx}`);
                    if (card) card.classList.remove('correct-flash', 'wrong-flash', 'unanswered-flash');
                    const badge = document.getElementById(`q-badge-${idx}`);
                    if (badge) badge.classList.remove('visible', 'user-correct', 'user-wrong');
                    const icon = document.getElementById(`q-icon-${idx}`);
                    if (icon) icon.classList.remove('visible');
                });
            }

            function generateNewQuestions() {
                if (isRunning && !isFinished) {
                    if (!confirm('当前练习正在进行中，生成新题将重置进度。确定吗？')) return;
                }
                resetAll();
                questions = generateQuestions();
                remainingSeconds = parseInt(timerMinutesInput.value * 60) || 60;
                totalSeconds = remainingSeconds;
                updateTimerDisplay();
                renderQuestions();
                scorePanel.classList.remove('visible');
                timerStatus.textContent = '准备就绪 · 点击"开始"启动计时';
            }

            // ============ 速查表生成与切换 ============
            function buildSquareTable() {
                const tbody = document.getElementById('squareTableBody');
                if (!tbody) return;
                tbody.innerHTML = '';
                for (let n = 10; n <= 25; n++) {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td><strong>${n}</strong></td><td>${n * n}</td>`;
                    tbody.appendChild(row);
                }
            }

            function buildMultiTable() {
                const thead = document.getElementById('multiTableHead');
                const tbody = document.getElementById('multiTableBody');
                if (!thead || !tbody) return;
                const maxMultiplier = 20;
                let headerRow = '<tr><th>数字</th>';
                for (let i = 1; i <= maxMultiplier; i++) {
                    headerRow += `<th>×${i}</th>`;
                }
                headerRow += '</tr>';
                thead.innerHTML = headerRow;

                tbody.innerHTML = '';
                for (let n = 11; n <= 20; n++) {
                    let row = `<td><strong>${n}</strong></td>`;
                    for (let m = 1; m <= maxMultiplier; m++) {
                        if (m <= n) {
                            row += `<td>${n * m}</td>`;
                        } else {
                            row += `<td style="color:#cbd5e1;">-</td>`;
                        }
                    }
                    const tr = document.createElement('tr');
                    tr.innerHTML = row;
                    tbody.appendChild(tr);
                }
            }

            function buildSpecialTable() {
                const thead = document.getElementById('specialTableHead');
                const tbody = document.getElementById('specialTableBody');
                if (!thead || !tbody) return;
                const maxMult = 10;
                let headerRow = '<tr><th>数字</th>';
                for (let i = 1; i <= maxMult; i++) {
                    headerRow += `<th>×${i}</th>`;
                }
                headerRow += '</tr>';
                thead.innerHTML = headerRow;

                tbody.innerHTML = '';
                // 24 行
                let row24 = `<td><strong>24</strong></td>`;
                for (let m = 1; m <= maxMult; m++) {
                    if (m <= 7) {
                        row24 += `<td>${24 * m}</td>`;
                    } else {
                        row24 += `<td style="color:#cbd5e1;">-</td>`;
                    }
                }
                const tr24 = document.createElement('tr');
                tr24.innerHTML = row24;
                tbody.appendChild(tr24);

                // 25 行
                let row25 = `<td><strong>25</strong></td>`;
                for (let m = 1; m <= maxMult; m++) {
                    row25 += `<td>${25 * m}</td>`;
                }
                const tr25 = document.createElement('tr');
                tr25.innerHTML = row25;
                tbody.appendChild(tr25);
            }

            function toggleTable(btn, tableDiv, showText, hideText) {
                const isVisible = tableDiv.style.display !== 'none';
                if (isVisible) {
                    tableDiv.style.display = 'none';
                    btn.textContent = showText;
                    btn.classList.remove('active-toggle');
                    btn.setAttribute('aria-expanded', 'false');
                } else {
                    tableDiv.style.display = 'block';
                    btn.textContent = hideText;
                    btn.classList.add('active-toggle');
                    btn.setAttribute('aria-expanded', 'true');
                }
            }

            // ============ 事件绑定 ============
            startBtn.addEventListener('click', startTimer);
            pauseBtn.addEventListener('click', () => {
                if (isPaused) {
                    resumeTimer();
                } else {
                    pauseTimer();
                }
            });
            resetBtn.addEventListener('click', () => {
                if (isRunning && !isFinished) {
                    if (!confirm('确定要重置当前练习吗？所有进度将丢失。')) return;
                }
                resetAll();
                renderQuestions();
            });
            answerBtn.addEventListener('click', () => {
                if (questions.length === 0) {
                    alert('请先生成题目！');
                    return;
                }
                if (isRunning && !isPaused && !isFinished) {
                    if (!confirm('查看答案将结束本次练习，确定吗？')) return;
                    finishTimer();
                    return;
                }
                if (answersRevealed) {
                    hideAnswers();
                    answerBtn.textContent = '查看答案';
                    if (!isFinished) {
                        questions.forEach((q, idx) => {
                            const inputEl = document.getElementById(`q-input-${idx}`);
                            if (inputEl) inputEl.disabled = false;
                        });
                    }
                } else {
                    if (!isFinished && isRunning && isPaused) {
                        if (!confirm('查看答案将结束本次练习，确定吗？')) return;
                        finishTimer();
                        return;
                    }
                    if (!isFinished && !isRunning && questions.some(q => q.userAnswer !== null)) {
                        isFinished = true;
                        revealAnswers();
                        questions.forEach((q, idx) => {
                            const inputEl = document.getElementById(`q-input-${idx}`);
                            if (inputEl) inputEl.disabled = true;
                        });
                        pauseBtn.disabled = true;
                        startBtn.disabled = false;
                        timerStatus.textContent = '已查看答案';
                    } else if (!isFinished && !isRunning) {
                        revealAnswers();
                        pauseBtn.disabled = true;
                    } else {
                        revealAnswers();
                    }
                    answerBtn.textContent = '隐藏答案';
                }
            });
            generateBtn.addEventListener('click', generateNewQuestions);

            // ============ 题型按钮点击 + 主题色同步 ============
            typeButtons.addEventListener('click', (e) => {
                const btn = e.target.closest('.type-btn');
                if (!btn) return;
                if (isRunning && !isFinished) {
                    if (!confirm('切换题型将重置所有题目，确定吗？')) return;
                }

                // 1. 移除所有按钮的 active 类
                typeButtons.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));

                // 2. 清除所有按钮的内联样式（重置为未选中状态）
                clearAllTypeBtnInlineStyles();

                // 3. 当前按钮添加 active 类
                btn.classList.add('active');
                activeTypeBtn = btn;

                // 4. 使用当前主题色设置当前按钮样式
                applyThemeToBtn(btn, currentTheme);

                // 5. 更新题型
                currentType = btn.dataset.type;
                resetAll();
                questions = [];
                renderQuestions();
                scorePanel.classList.remove('visible');
                timerStatus.textContent = '准备就绪 · 点击"生成新题"创建题目';
            });

            questionCountInput.addEventListener('change', () => {
                if (isRunning && !isFinished) {
                    if (confirm('修改题目数量将重置练习，确定吗？')) {
                        resetAll();
                        questions = [];
                        renderQuestions();
                        scorePanel.classList.remove('visible');
                        timerStatus.textContent = '准备就绪 · 点击"生成新题"创建题目';
                    } else {
                        questionCountInput.value = questions.length || 20;
                    }
                }
            });
            timerMinutesInput.addEventListener('change', () => {
                if (isRunning && !isFinished) {
                    if (confirm('修改倒计时将重置练习，确定吗？')) {
                        resetAll();
                        remainingSeconds = parseInt(timerMinutesInput.value * 60) || 60;
                        totalSeconds = remainingSeconds;
                        updateTimerDisplay();
                    } else {
                        timerMinutesInput.value = (totalSeconds / 60).toFixed(1);
                    }
                } else {
                    remainingSeconds = parseInt(timerMinutesInput.value * 60) || 60;
                    totalSeconds = remainingSeconds;
                    updateTimerDisplay();
                }
            });

            // 速查表切换事件
            toggleSquareBtn.addEventListener('click', () => {
                toggleTable(toggleSquareBtn, squareTable, '展开 10-25 平方数表', '隐藏 10-25 平方数表');
            });
            toggleMultiBtn.addEventListener('click', () => {
                toggleTable(toggleMultiBtn, multiTable, '展开 11-20 乘法口诀表', '隐藏 11-20 乘法口诀表');
            });
            toggleSpecialBtn.addEventListener('click', () => {
                toggleTable(toggleSpecialBtn, specialTable, '展开 24·25 乘法表', '隐藏 24·25 乘法表');
            });

            // ============ 主题切换 ============
            function setTheme(themeName) {
                currentTheme = themeName;

                // 更新顶部卡片渐变
                let gradient = '';
                switch (themeName) {
                    case 'orange':
                        gradient = 'linear-gradient(135deg, #ff9a3c 0%, #ff6b6b 100%)';
                        break;
                    case 'pink':
                        gradient = 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)';
                        break;
                    case 'grayblue':
                        gradient = 'linear-gradient(135deg, #2c3e50 0%, #3498db 100%)';
                        break;
                    case 'mint':
                        gradient = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
                        break;
                    case 'purple':
                        gradient = 'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)';
                        break;
                    default:
                        gradient = 'linear-gradient(135deg, #ff9a3c 0%, #ff6b6b 100%)';
                }
                heroCard.style.background = gradient;

                // 更新 body 背景
                const body = document.body;
                ['orange', 'pink', 'grayblue', 'mint', 'purple'].forEach(t => body.classList.remove(
                    `theme-${t}`));
                if (themeName !== 'orange') {
                    body.classList.add(`theme-${themeName}`);
                }

                // 更新当前 active 题型按钮的颜色
                updateActiveBtnTheme();

                // 主题圆点高亮
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-theme-dot'));
                const activeThemeBtn = document.querySelector(`.theme-btn[data-theme="${themeName}"]`);
                if (activeThemeBtn) activeThemeBtn.classList.add('active-theme-dot');

                localStorage.setItem('oral_math_theme', themeName);
            }

            function initTheme() {
                const saved = localStorage.getItem('oral_math_theme');
                const theme = saved || 'orange';
                setTheme(theme);
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const t = btn.dataset.theme;
                        if (t) setTheme(t);
                    });
                });
            }

            // ============ 工具函数 ============
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // ============ 键盘快捷键 ============
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target
                    .tagName === 'SELECT') {
                    return;
                }
                switch (e.key.toLowerCase()) {
                    case ' ':
                        e.preventDefault();
                        if (isRunning && !isPaused && !isFinished) {
                            pauseTimer();
                        } else if (isPaused && !isFinished) {
                            resumeTimer();
                        } else if (!isRunning && !isFinished) {
                            startTimer();
                        }
                        break;
                    case 'r':
                        if (e.ctrlKey || e.metaKey) break;
                        e.preventDefault();
                        if (isRunning && !isFinished) {
                            if (confirm('确定要重置当前练习吗？')) resetAll();
                        } else {
                            resetAll();
                        }
                        renderQuestions();
                        break;
                    case 'g':
                        if (e.ctrlKey || e.metaKey) break;
                        e.preventDefault();
                        generateNewQuestions();
                        break;
                    case 'a':
                        if (e.ctrlKey || e.metaKey) break;
                        e.preventDefault();
                        answerBtn.click();
                        break;
                }
            });

            // ============ 初始化 ============
            function init() {
                remainingSeconds = parseInt(timerMinutesInput.value * 60) || 60;
                totalSeconds = remainingSeconds;
                updateTimerDisplay();
                initTheme();
                buildSquareTable();
                buildMultiTable();
                buildSpecialTable();
                questions = generateQuestions();
                renderQuestions();
                timerStatus.textContent = '准备就绪 · 点击"开始"启动计时';
            }

            init();

            console.log('口算练习已就绪 | Twolobster');
            console.log('  快捷键：空格=开始/暂停 | G=生成新题 | R=重置 | A=查看答案');
        })();
    </script>
</body>
</html>
