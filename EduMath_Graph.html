<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>函数可视化平台</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        /* 样式保持不变 (略) */
        body, html { margin: 0; overflow: hidden; width: 100%; height: 100%; font-family: 'Segoe UI', 'Avenir', 'Inter', sans-serif; background: radial-gradient(circle at 20% 30%, #0b0f1c, #020408); color: #e0f2ff; }
        #app { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid rgba(0, 255, 255, 0.3); background: rgba(4, 12, 24, 0.65); backdrop-filter: blur(12px); box-shadow: 0 0 30px rgba(0, 180, 255, 0.2); z-index: 10; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(135deg, #00ffff, #b44cff); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 20px #00aaff88, 0 0 40px #7a4cff66; }
        .function-badge { display: flex; gap: 12px; }
        .tab-btn { background: transparent; border: 1.5px solid #2f6f9f; color: #aad0ff; font-size: 1rem; font-weight: 600; padding: 8px 22px; border-radius: 40px; cursor: pointer; backdrop-filter: blur(8px); box-shadow: 0 0 12px #00aaff33; text-transform: uppercase; letter-spacing: 2px; transition: all 0.25s ease; background: rgba(8, 25, 45, 0.5); }
        .tab-btn.active { background: #00aaff22; border-color: #0cf; color: #b0f0ff; box-shadow: 0 0 24px #0cf, inset 0 0 8px #0cf6; text-shadow: 0 0 12px #0cf; }
        #canvas-container { flex: 1; width: 100%; position: relative; overflow: hidden; }
        .control-panel { position: absolute; top: 100px; right: 24px; width: 300px; background: rgba(6, 18, 30, 0.7); backdrop-filter: blur(20px); border: 1px solid #0cf3; border-radius: 32px; padding: 24px 20px; box-shadow: 0 20px 40px #00000080, 0 0 0 1px #0cf1 inset, 0 0 30px #00aaff4d; z-index: 20; color: #d3ecff; transition: all 0.2s; }
        @media (max-width: 700px) { .control-panel { top: auto; bottom: 20px; right: 16px; left: 16px; width: auto; border-radius: 28px; padding: 18px; } .header { padding: 12px 16px; } .logo { font-size: 1.3rem; } }
        .param-group { margin-bottom: 28px; }
        .param-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; color: #7fc9ff; text-shadow: 0 0 10px #0cf; border-left: 4px solid #0cf; padding-left: 12px; }
        .slider-item { margin-bottom: 18px; }
        .slider-item label { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500; color: #bbe4ff; text-shadow: 0 0 5px #2af6; }
        .slider-item input { width: 100%; margin-top: 6px; background: transparent; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 10px; background: linear-gradient(90deg, #0cf, #b44cff); box-shadow: 0 0 12px #0cf; }
        .slider-item input::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #ffffff; border: 2px solid #0cf; box-shadow: 0 0 20px #0cf, 0 0 8px #fff; cursor: pointer; transition: 0.1s; }
        .value-display { font-family: 'JetBrains Mono', monospace; color: #b2fcff; background: #0a1e2e; padding: 2px 10px; border-radius: 24px; border: 1px solid #0cf6; }
        .action-buttons { display: flex; gap: 12px; margin: 24px 0 16px; }
        .neon-btn { background: transparent; border: 1.5px solid #0cf; color: #d4f2ff; flex: 1; padding: 10px 0; border-radius: 40px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; backdrop-filter: blur(8px); box-shadow: 0 0 15px #0cf4; cursor: pointer; transition: 0.2s; background: #0a1e2e80; }
        .neon-btn:hover { background: #0cf3; box-shadow: 0 0 30px #0cf, inset 0 0 10px white; color: #000c14; border-color: #fff; }
        .info-card { background: #04121e80; border-radius: 20px; padding: 16px; border: 1px solid #ff4d9a33; box-shadow: 0 0 20px #ff4d9a22; margin-top: 16px; }
        .expression { font-size: 1.3rem; font-family: 'JetBrains Mono', monospace; text-align: center; background: #00000040; padding: 12px 6px; border-radius: 18px; border: 1px solid #f0f; box-shadow: 0 0 30px #ff44ee55; color: #ffe6ff; text-shadow: 0 0 15px #f0f; margin-bottom: 12px; white-space: nowrap; overflow: visible; text-overflow: clip; }
        .vertex-info { font-size: 0.95rem; display: flex; flex-wrap: wrap; gap: 8px 16px; justify-content: center; }
        .vertex-info span { color: #aaf0ff; }
        .coordinate-hint { position: absolute; bottom: 20px; left: 20px; background: #041826cc; backdrop-filter: blur(12px); padding: 10px 20px; border-radius: 40px; border: 1px solid #0cf; color: #b5f0ff; font-family: monospace; font-size: 1rem; box-shadow: 0 0 30px #00aaff66; pointer-events: none; z-index: 15; }
        .copyright { position: absolute; bottom: 20px; right: 24px; color: #6c8db0; font-size: 0.8rem; opacity: 0.7; text-shadow: 0 0 8px #0cf; z-index: 15; pointer-events: none; }
        .hidden { display: none !important; }
        .grid-toggle-btn { position: absolute; bottom: 20px; left: 300px; background: rgba(6, 18, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid #0cf; color: #aaf0ff; padding: 8px 16px; border-radius: 30px; font-size: 0.8rem; cursor: pointer; z-index: 16; box-shadow: 0 0 15px #0cf4; transition: 0.2s; pointer-events: auto; }
        .grid-toggle-btn:hover { background: #0cf3; color: #000; }
        @media (max-width: 700px) { .grid-toggle-btn { left: 20px; bottom: 80px; } }
        .note { font-size: 0.8rem; opacity: 0.8; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="logo">◈函数可视化 ◈</div>
            <div class="function-badge">
                <button id="tab-linear" class="tab-btn active">⚡ 一次函数</button>
                <button id="tab-quadratic" class="tab-btn">🌀 二次函数</button>
            </div>
        </div>
        <div id="canvas-container"></div>
        <div id="hover-coords" class="coordinate-hint">⟳ 悬停查看坐标</div>
        <button id="toggle-grid-btn" class="grid-toggle-btn">🌐 隐藏网格</button>
        <div class="copyright">©Twolobster丨EduMath · Graph</div>
        <div class="control-panel">
            <div id="linear-params" class="param-group">
                <div class="param-title">线性参数 k · b</div>
                <div class="slider-item">
                    <label>斜率 K <span id="k-val" class="value-display">1.00</span></label>
                    <input type="range" id="k-slider" min="-5" max="5" step="0.05" value="1.0">
                </div>
                <div class="slider-item">
                    <label>截距 b <span id="b-val" class="value-display">0.00</span></label>
                    <input type="range" id="b-slider" min="-5" max="5" step="0.1" value="0.0">
                </div>
            </div>
            <div id="quad-params" class="param-group hidden">
                <div class="param-title">二次系数 a · b · c</div>
                <div class="slider-item">
                    <label>二次项 a (开口) <span id="a-val" class="value-display">1.00</span></label>
                    <input type="range" id="a-slider" min="-2.5" max="2.5" step="0.05" value="1.0">
                </div>
                <div class="slider-item">
                    <label>一次项 b <span id="b2-val" class="value-display">0.00</span></label>
                    <input type="range" id="b2-slider" min="-5" max="5" step="0.1" value="0.0">
                </div>
                <div class="slider-item">
                    <label>常数 c <span id="c-val" class="value-display">0.00</span></label>
                    <input type="range" id="c-slider" min="-5" max="5" step="0.1" value="0.0">
                </div>
            </div>
            <div class="action-buttons">
                <button id="reset-btn" class="neon-btn">⟲ 重置</button>
                <button id="random-btn" class="neon-btn">🎲 随机</button>
            </div>
            <div class="info-card">
                <div id="func-expression" class="expression">y = 1.00 x + 0.00</div>
                <div id="extra-info" class="vertex-info">
                    <span>Y截距: (0, 0.00)</span>
                    <span>X截距: (0.00, 0)</span>
                </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#050a14');
        
        const aspect = container.clientWidth / container.clientHeight;
        const frustumSize = 16;
        const camera = new THREE.OrthographicCamera(
            -frustumSize * aspect / 2, frustumSize * aspect / 2,
            frustumSize / 2, -frustumSize / 2,
            0.1, 100
        );
        camera.position.set(0, 0, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const cssRenderer = new CSS2DRenderer();
        cssRenderer.setSize(container.clientWidth, container.clientHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = '0';
        cssRenderer.domElement.style.left = '0';
        cssRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(cssRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.enablePan = true;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // 光照
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xbfe4ff, 1.2);
        dirLight.position.set(2, 5, 10);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.8);
        backLight.position.set(-3, 2, 8);
        scene.add(backLight);
        const colorLight1 = new THREE.PointLight(0xff44aa, 0.5);
        colorLight1.position.set(4, -2, 5);
        scene.add(colorLight1);
        const colorLight2 = new THREE.PointLight(0x00ccff, 0.7);
        colorLight2.position.set(-4, 3, 6);
        scene.add(colorLight2);
        
        // 星芒
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i+=3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i+1] = (Math.random() - 0.5) * 200;
            starPositions[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.08, transparent: true});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        const gridGroup = new THREE.Group();
        const axisGroup = new THREE.Group();
        const curveGroup = new THREE.Group();
        const markersGroup = new THREE.Group();
        const symmetryGroup = new THREE.Group();
        const labelGroup = new THREE.Group();
        
        scene.add(gridGroup);
        scene.add(axisGroup);
        scene.add(curveGroup);
        scene.add(markersGroup);
        scene.add(symmetryGroup);
        scene.add(labelGroup);

        let gridVisible = true;
        const toggleBtn = document.getElementById('toggle-grid-btn');
        toggleBtn.addEventListener('click', () => {
            gridVisible = !gridVisible;
            gridGroup.visible = gridVisible;
            toggleBtn.textContent = gridVisible ? '🌐 隐藏网格' : '🌐 显示网格';
        });

        function buildStaticScene() {
            const gridColor = 0x44ddff;
            const gridDivisions = 16;
            const gridSize = 16;
            const step = gridSize / gridDivisions;
            
            const gridMaterial = new THREE.LineBasicMaterial({ color: gridColor });
            const gridLines = [];
            for (let i = -gridSize/2; i <= gridSize/2; i+= step) {
                gridLines.push(new THREE.Vector3(i, -gridSize/2, -0.1));
                gridLines.push(new THREE.Vector3(i, gridSize/2, -0.1));
                gridLines.push(new THREE.Vector3(-gridSize/2, i, -0.1));
                gridLines.push(new THREE.Vector3(gridSize/2, i, -0.1));
            }
            const gridGeo = new THREE.BufferGeometry().setFromPoints(gridLines);
            const gridLineSeg = new THREE.LineSegments(gridGeo, gridMaterial);
            gridGroup.add(gridLineSeg);
            
            const axisMatX = new THREE.LineBasicMaterial({ color: 0x00ffff });
            const axisMatY = new THREE.LineBasicMaterial({ color: 0xff44aa });
            const axisLength = 8.5;
            const xAxisPoints = [new THREE.Vector3(-axisLength, 0, 0), new THREE.Vector3(axisLength, 0, 0)];
            const yAxisPoints = [new THREE.Vector3(0, -axisLength, 0), new THREE.Vector3(0, axisLength, 0)];
            const xAxisLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(xAxisPoints), axisMatX);
            const yAxisLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(yAxisPoints), axisMatY);
            axisGroup.add(xAxisLine);
            axisGroup.add(yAxisLine);
            
            for (let i = -8; i <= 8; i+=1) {
                if (i === 0) continue;
                const divX = document.createElement('div');
                divX.textContent = i;
                divX.style.color = '#aaf0ff';
                divX.style.fontSize = '14px';
                divX.style.fontWeight = 'bold';
                divX.style.textShadow = '0 0 12px #0cf';
                divX.style.fontFamily = 'monospace';
                const labelX = new CSS2DObject(divX);
                labelX.position.set(i, -0.25, 0);
                labelGroup.add(labelX);
                
                const divY = document.createElement('div');
                divY.textContent = i;
                divY.style.color = '#ffaad4';
                divY.style.fontSize = '14px';
                divY.style.fontWeight = 'bold';
                divY.style.textShadow = '0 0 12px #f6f';
                divY.style.fontFamily = 'monospace';
                const labelY = new CSS2DObject(divY);
                labelY.position.set(-0.4, i-0.15, 0);
                labelGroup.add(labelY);
            }
            const originDiv = document.createElement('div');
            originDiv.textContent = '0';
            originDiv.style.color = '#fff';
            originDiv.style.fontSize = '14px';
            originDiv.style.textShadow = '0 0 15px #fff';
            const originLabel = new CSS2DObject(originDiv);
            originLabel.position.set(-0.25, -0.25, 0);
            labelGroup.add(originLabel);
        }
        buildStaticScene();

        // --- 优化后的霓虹管：提高分段数与采样，保证大曲率下依然圆滑 ---
        function createNeonTube(points, color, radius = 0.04) {
            const curve = new THREE.CatmullRomCurve3(points);
            // tubularSegments 提升至 1200，radialSegments 提升至 16
            const tubeGeo = new THREE.TubeGeometry(curve, 1200, radius, 16, false);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 1.4,
                roughness: 0.2,
                metalness: 0.1,
                transparent: true,
                opacity: 0.95
            });
            return new THREE.Mesh(tubeGeo, material);
        }

        let currentMode = 'linear';
        
        const linearDiv = document.getElementById('linear-params');
        const quadDiv = document.getElementById('quad-params');
        const tabLinear = document.getElementById('tab-linear');
        const tabQuad = document.getElementById('tab-quadratic');
        const exprDiv = document.getElementById('func-expression');
        const extraInfoDiv = document.getElementById('extra-info');
        const hoverDiv = document.getElementById('hover-coords');
        
        const kSlider = document.getElementById('k-slider');
        const bSlider = document.getElementById('b-slider');
        const aSlider = document.getElementById('a-slider');
        const b2Slider = document.getElementById('b2-slider');
        const cSlider = document.getElementById('c-slider');
        const kVal = document.getElementById('k-val');
        const bVal = document.getElementById('b-val');
        const aVal = document.getElementById('a-val');
        const b2Val = document.getElementById('b2-val');
        const cVal = document.getElementById('c-val');
        
        const resetBtn = document.getElementById('reset-btn');
        const randomBtn = document.getElementById('random-btn');
        
        function updateSliderDisplay() {
            kVal.textContent = parseFloat(kSlider.value).toFixed(2);
            bVal.textContent = parseFloat(bSlider.value).toFixed(2);
            aVal.textContent = parseFloat(aSlider.value).toFixed(2);
            b2Val.textContent = parseFloat(b2Slider.value).toFixed(2);
            cVal.textContent = parseFloat(cSlider.value).toFixed(2);
        }
        
        function renderFunction() {
            while(curveGroup.children.length) curveGroup.remove(curveGroup.children[0]);
            while(markersGroup.children.length) markersGroup.remove(markersGroup.children[0]);
            while(symmetryGroup.children.length) symmetryGroup.remove(symmetryGroup.children[0]);
            
            const xMin = -8.0, xMax = 8.0;
            // 极大增加采样点，确保二次函数在大 a 值时顶点附近有足够点描述曲率
            const steps = 3000;
            
            if (currentMode === 'linear') {
                const k = parseFloat(kSlider.value);
                const b = parseFloat(bSlider.value);
                
                exprDiv.innerHTML = `y = ${k.toFixed(2)} x ${b >= 0 ? '+ ' : '- '} ${Math.abs(b).toFixed(2)}`;
                
                const points = [];
                for (let i = 0; i <= steps; i++) {
                    const x = xMin + (i / steps) * (xMax - xMin);
                    const y = k * x + b;
                    points.push(new THREE.Vector3(x, y, 0));
                }
                const tube = createNeonTube(points, 0x00ccff, 0.045);
                curveGroup.add(tube);
                
                const yMarker = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), 
                    new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff2299, emissiveIntensity: 1.5 }));
                yMarker.position.set(0, b, 0.1);
                markersGroup.add(yMarker);
                
                let xIntercept = null;
                if (Math.abs(k) > 0.001) {
                    xIntercept = -b / k;
                    if (Math.abs(xIntercept) <= 8.5) {
                        const xMarker = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), 
                            new THREE.MeshStandardMaterial({ color: 0xaa66ff, emissive: 0xaa44ff }));
                        xMarker.position.set(xIntercept, 0, 0.1);
                        markersGroup.add(xMarker);
                    }
                }
                
                const xIntText = (xIntercept !== null && isFinite(xIntercept)) ? xIntercept.toFixed(2) : '—';
                extraInfoDiv.innerHTML = `<span>Y截距: (0, ${b.toFixed(2)})</span><span>X截距: (${xIntText}, 0)</span>`;
                
                const vertexDisplay = document.getElementById('vertex-f-display');
                if (vertexDisplay) vertexDisplay.remove();
                
            } else {
                const a = parseFloat(aSlider.value);
                const b = parseFloat(b2Slider.value);
                const c = parseFloat(cSlider.value);
                
                exprDiv.innerHTML = `y = ${a.toFixed(2)}x² ${b >= 0 ? '+ ' : '- '} ${Math.abs(b).toFixed(2)}x ${c >= 0 ? '+ ' : '- '} ${Math.abs(c).toFixed(2)}`;
                
                const points = [];
                for (let i = 0; i <= steps; i++) {
                    const x = xMin + (i / steps) * (xMax - xMin);
                    const y = a * x * x + b * x + c;
                    points.push(new THREE.Vector3(x, y, 0));
                }
                const tube = createNeonTube(points, 0xff44aa, 0.05);
                curveGroup.add(tube);
                
                const h = -b / (2 * a);
                const k = a * h * h + b * h + c;
                
                const vMarker = new THREE.Mesh(new THREE.SphereGeometry(0.15, 20, 20), 
                    new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xff8800, emissiveIntensity: 1.8 }));
                vMarker.position.set(h, k, 0.15);
                markersGroup.add(vMarker);
                
                if (isFinite(h) && Math.abs(h) < 9) {
                    const dashMaterial = new THREE.LineDashedMaterial({ color: 0x88aaff, dashSize: 0.08, gapSize: 0.06 });
                    const axisPoints = [new THREE.Vector3(h, -8.5, 0), new THREE.Vector3(h, 8.5, 0)];
                    const lineGeo = new THREE.BufferGeometry().setFromPoints(axisPoints);
                    const dashLine = new THREE.Line(lineGeo, dashMaterial);
                    dashLine.computeLineDistances();
                    symmetryGroup.add(dashLine);
                }
                
                const yInt = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12), 
                    new THREE.MeshStandardMaterial({ color: 0x66ccff, emissive: 0x2288ff }));
                yInt.position.set(0, c, 0.1);
                markersGroup.add(yInt);
                
                const dir = a > 0 ? '↑ 开口向上' : '↓ 开口向下';
                extraInfoDiv.innerHTML = `<span>🔷 顶点 (${h.toFixed(2)}, ${k.toFixed(2)})</span><span>📐 对称轴 x=${h.toFixed(2)}</span><span>${dir}</span>`;
                
                updateVertexDisplay(h, k);
            }
            updateSliderDisplay();
        }
        
        function updateVertexDisplay(h, k) {
            const existing = document.getElementById('vertex-f-display');
            if (currentMode === 'quadratic') {
                if (!existing) {
                    const div = document.createElement('div');
                    div.id = 'vertex-f-display';
                    div.style.position = 'absolute';
                    div.style.bottom = '80px';
                    div.style.left = '20px';
                    div.style.background = '#041826cc';
                    div.style.backdropFilter = 'blur(12px)';
                    div.style.padding = '8px 20px';
                    div.style.borderRadius = '40px';
                    div.style.border = '1px solid #ff4d9a';
                    div.style.color = '#ffb3ff';
                    div.style.fontFamily = 'monospace';
                    div.style.fontSize = '1rem';
                    div.style.boxShadow = '0 0 30px #ff44ee66';
                    div.style.zIndex = '15';
                    div.style.pointerEvents = 'none';
                    document.body.appendChild(div);
                }
                const el = document.getElementById('vertex-f-display');
                el.innerHTML = `🎯 顶点 f(${h.toFixed(2)}) = ${k.toFixed(2)}`;
            } else {
                if (existing) existing.remove();
            }
        }
        
        function bindEvents() {
            const inputs = [kSlider, bSlider, aSlider, b2Slider, cSlider];
            inputs.forEach(s => s.addEventListener('input', () => {
                updateSliderDisplay();
                renderFunction();
            }));
            
            tabLinear.addEventListener('click', () => {
                currentMode = 'linear';
                linearDiv.classList.remove('hidden');
                quadDiv.classList.add('hidden');
                tabLinear.classList.add('active');
                tabQuad.classList.remove('active');
                const el = document.getElementById('vertex-f-display');
                if (el) el.remove();
                renderFunction();
            });
            tabQuad.addEventListener('click', () => {
                currentMode = 'quadratic';
                linearDiv.classList.add('hidden');
                quadDiv.classList.remove('hidden');
                tabLinear.classList.remove('active');
                tabQuad.classList.add('active');
                renderFunction();
            });
            
            resetBtn.addEventListener('click', () => {
                if (currentMode === 'linear') {
                    kSlider.value = '1.0'; bSlider.value = '0.0';
                } else {
                    aSlider.value = '1.0'; b2Slider.value = '0.0'; cSlider.value = '0.0';
                }
                updateSliderDisplay();
                renderFunction();
            });
            
            randomBtn.addEventListener('click', () => {
                if (currentMode === 'linear') {
                    kSlider.value = (Math.random() * 6 - 3).toFixed(2);
                    bSlider.value = (Math.random() * 6 - 3).toFixed(2);
                } else {
                    aSlider.value = (Math.random() * 4 - 2).toFixed(2);
                    b2Slider.value = (Math.random() * 6 - 3).toFixed(2);
                    cSlider.value = (Math.random() * 6 - 3).toFixed(2);
                    if (parseFloat(aSlider.value) === 0) aSlider.value = '0.5';
                }
                updateSliderDisplay();
                renderFunction();
            });
        }
        
        const raycaster = new THREE.Raycaster();
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const targetPoint = new THREE.Vector3();
        
        renderer.domElement.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.ray.intersectPlane(plane, targetPoint)) {
                const x = targetPoint.x.toFixed(2);
                const y = targetPoint.y.toFixed(2);
                hoverDiv.innerHTML = `🌐 坐标 ( ${x} , ${y} )`;
            } else {
                hoverDiv.innerHTML = `⟳ 悬停查看坐标`;
            }
        });
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            cssRenderer.setSize(width, height);
            const aspect = width / height;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
        }
        
        bindEvents();
        updateSliderDisplay();
        renderFunction();
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
        }
        animate();
        onWindowResize();
        
        console.log('✨ 霓虹函数可视化 · 极致平滑版');
    </script>
</body>
</html>
