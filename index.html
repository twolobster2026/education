<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Twolobster｜Edu Math</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #222;
    }

    /* ===== 全局 ===== */
    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    /* ===== 头部 ===== */
    header {
      text-align: center;
      padding: 80px 20px 30px;
    }

    header h1 {
      font-size: 40px;
      margin: 0;
      letter-spacing: 1px;
    }

    header p {
      margin-top: 14px;
      font-size: 16px;
      color: #666;
    }

    /* ===== 流程总览 ===== */
    .flow-overview {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-top: 60px;
    }

    .flow-stage {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 32px;
      transition: all 0.3s ease;
    }

    .flow-stage:hover {
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      transform: translateY(-6px);
    }

    .stage-index {
      font-size: 14px;
      font-weight: bold;
      color: #999;
      margin-bottom: 10px;
    }

    .flow-stage h2 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    .stage-desc {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .stage-modules {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stage-modules a {
      padding: 12px 16px;
      border-radius: 8px;
      background: #f7f7f7;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .stage-modules a:hover {
      background: #2b8fed;
      color: #fff;
    }

    /* ===== 页脚 ===== */
    footer {
      border-top: 1px solid #eee;
      padding: 40px 20px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .qr {
      margin-top: 20px;
    }

    .qr img {
      width: 120px;
      height: 120px;
      background: #f2f2f2;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 900px) {
      .flow-overview {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Twolobster｜Edu Math</h1>
  <p>数学 · 教育辅助工具平台</p>
</header>

<div class="container">

      <h2>数学</h2>
      <div class="stage-desc">
        口算练习，数感培养，平方数的记忆，一次函数与二次函数可视化
      </div>
      <div class="stage-modules">
        <a href="EduMath_Mental Math.html">口算与数感</a>
        <a href="EduMath_Graph.html">一次函数与二次函数可视化</a>
        <a href="EduMath_Motion & number line.html">数轴动点综合 · 参数讨论</a>
        <a href="EduMath_prime.html">找质数</a>
        <a href="EduMath_Schulte.html">舒尔特方格</a>
      </div>
    </div>

    <!-- 工具 -->
    <div class="flow-stage">
      <div class="stage-index">SUBJECT</div>
      <h2>工具</h2>
      <div class="stage-desc">
        学习辅助工具
      </div>
      <div class="stage-modules">
        <a href="Eduplanner.html">学习计划打卡</a>
        <a href="EduCredits_Manager.html">课外班管理</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="qr" style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;">
    <div style="text-align: center;">
      <img src="images/bilibili code.jpg" alt="B站" style="width: 120px; height: 120px; background: #f2f2f2;" onerror="this.src='https://via.placeholder.com/120x120?text=B站二维码'">
      <div style="margin-top: 5px; font-size: 14px;">B站</div>
    </div>
    <div style="text-align: center;">
      <img src="images/QQ music.jpg" alt="QQ音乐播客" style="width: 120px; height: 120px; background: #f2f2f2;" onerror="this.src='https://via.placeholder.com/120x120?text=QQ音乐二维码'">
      <div style="margin-top: 5px; font-size: 14px;">QQ音乐播客</div>
    </div>
    <div style="text-align: center;">
      <img src="images/broadcast.jpg" alt="小宇宙" style="width: 120px; height: 120px; background: #f2f2f2;" onerror="this.src='https://via.placeholder.com/120x120?text=小宇宙二维码'">
      <div style="margin-top: 5px; font-size: 14px;">小宇宙</div>
    </div>
    <div style="text-align: center;">
      <img src="images/office cat.jpg" alt="微信表情" style="width: 120px; height: 120px; background: #f2f2f2;" onerror="this.src='https://via.placeholder.com/120x120?text=微信表情二维码'">
      <div style="margin-top: 5px; font-size: 14px;">微信表情</div>

  </div>

  <!-- 版权信息 -->
  <div style="margin-top: 15px;">© Twolobster ｜ Edu Math</div>
</footer>

</html>
